<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>한국사 영웅전</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
body{font-family:'Noto+Serif+KR',serif;background:#0a0a14;color:#e8dcc8;overflow:hidden;height:100vh;width:100vw;touch-action:manipulation}
canvas{display:block;position:absolute;top:0;left:0}

/* overlays */
.ov{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:16px;text-align:center}
.ov.on{display:flex}
#title-ov{background:linear-gradient(180deg,#181008,#0a0a14)}
#story-ov{background:linear-gradient(180deg,#0e0e0eee,#0a0a14ee)}
#vic-ov{background:#0a0a14ee}
#lose-ov{background:#0a0a14ee}
#team-ov{background:#0a0a14;overflow-y:auto;justify-content:flex-start;padding-top:20px}
#end-ov{background:#0a0a14}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{text-shadow:0 0 20px #c4956a44}50%{text-shadow:0 0 40px #c4956a99}}
@keyframes hitL{0%{transform:translateX(0)}20%{transform:translateX(40px) scale(1.1)}50%{transform:translateX(-5px)}100%{transform:translateX(0) scale(1)}}
@keyframes hitR{0%{transform:translateX(0)}20%{transform:translateX(-40px) scale(1.1)}50%{transform:translateX(5px)}100%{transform:translateX(0) scale(1)}}
@keyframes dmgPop{0%{opacity:0;transform:scale(.5) translateY(10px)}50%{opacity:1;transform:scale(1.2) translateY(-5px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes flash{0%,100%{opacity:0}50%{opacity:.6}}
.au{animation:fadeUp .5s ease}
.hl{animation:hitL .45s ease}
.hr{animation:hitR .45s ease}

.gt{font-size:clamp(26px,7vw,46px);font-weight:900;background:linear-gradient(180deg,#f4e4c1,#c4956a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glow 3s infinite}
.gs{font-size:clamp(11px,2.5vw,14px);color:#8a7a6a;font-style:italic;margin-top:6px}
.gb{padding:13px 36px;border:1px solid #5a3a1a;border-radius:8px;font-family:inherit;font-size:15px;font-weight:700;color:#e8dcc8;background:#6B1A0A;cursor:pointer;letter-spacing:2px;box-shadow:0 2px 10px #0006}
.gb:active{transform:scale(.95);filter:brightness(.85)}
.gb2{background:#2a2a3e;font-size:13px;padding:10px 24px;letter-spacing:1px}

/* bottom HUD */
#hud{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,#0c0c18fa 60%,#0c0c1800);padding:8px 10px 10px;z-index:20;display:none}
#hud-info{display:flex;gap:8px;align-items:center;margin-bottom:6px}
#hud-portrait{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid #c4956a;background:#111}
#hud-stats{flex:1;font-size:11px}
#hud-name{font-size:13px;font-weight:700;margin-bottom:3px}
.hbar{height:8px;background:#1a1a2e;border-radius:4px;overflow:hidden;margin-top:2px}
.hfill{height:100%;border-radius:4px;transition:width .3s}
#hud-btns{display:flex;gap:5px;flex-wrap:wrap}
#hud-btns button{flex:1;min-width:60px;padding:9px 4px;border:1px solid #5a3a1a;border-radius:6px;font-family:inherit;font-size:11px;font-weight:700;color:#e8dcc8;cursor:pointer}
#hud-btns button:active{transform:scale(.95)}
#hud-btns button:disabled{opacity:.3;pointer-events:none}
.ba{background:#7a1a0a}.bs{background:#1a3a5c}.bw{background:#2a2a3e}.bi{background:#2a5a2a}

/* top bar */
#topbar{position:absolute;top:0;left:0;right:0;height:36px;background:linear-gradient(180deg,#0c0c18ee,#0c0c1800);display:flex;justify-content:space-between;align-items:center;padding:0 12px;z-index:20;font-size:11px}
#topbar .era{color:#c4956a;font-weight:700;letter-spacing:2px}
#topbar .info{color:#777}

/* guide text */
#guide{position:absolute;top:38px;left:0;right:0;text-align:center;font-size:11px;color:#c4956acc;z-index:20;pointer-events:none;text-shadow:0 1px 3px #000}

/* battle cutin */
#cutin{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:60}
#cutin.on{display:flex}
.cf{text-align:center;position:relative}
.cf-emoji{font-size:52px;display:block}
.cf-name{font-size:15px;font-weight:700;margin-top:4px}
.cf-hp{font-size:10px;color:#aaa;margin-top:2px}
#cut-vs{font-size:26px;font-weight:900;color:#c4956a;margin:0 16px}
#cut-msg{font-size:13px;color:#ddd;margin-top:12px;min-height:20px}
#cut-dmg{font-size:24px;font-weight:900;color:#ff4444;margin-top:6px;min-height:32px}
#cut-flash{position:absolute;top:0;left:0;width:100%;height:100%;background:#fff;pointer-events:none;opacity:0}

/* story */
.sbox{background:#0a0a14cc;border:1px solid #ffffff22;border-radius:10px;padding:16px;max-width:420px;width:100%;margin:12px 0;min-height:60px;line-height:1.9;font-size:13px}
.shl{color:#c4956a;font-weight:700}
.dots{display:flex;gap:4px;justify-content:center;margin-top:8px}
.dot{width:7px;height:7px;border-radius:50%;background:#333}.dot.on{background:#c4956a}

/* team */
.tg{display:grid;grid-template-columns:1fr;gap:8px;width:100%;max-width:420px}
.tc{background:linear-gradient(135deg,#151520,#1a1a2e);border:1px solid #2a2a3e;border-radius:8px;padding:10px;display:flex;gap:8px}
.tc-i{font-size:22px;margin-top:2px}
.tc-r{font-size:10px;color:#c4956a;font-weight:700}
.tc-n{font-size:13px;font-weight:700}
.tc-d{font-size:10px;color:#888;line-height:1.5;margin-top:3px}

/* popup msg */
#popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#151520ee;border:2px solid #c4956a;border-radius:12px;padding:18px 20px;z-index:80;display:none;text-align:center;max-width:300px;width:88%}
#pop-t{font-size:15px;font-weight:700;color:#c4956a;margin-bottom:6px}
#pop-b{font-size:12px;line-height:1.7;color:#ccc;white-space:pre-line}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="topbar"><span class="era" id="tb-era"></span><span class="info" id="tb-info"></span></div>
<div id="guide"></div>
<div id="hud">
  <div id="hud-info">
    <div id="hud-portrait"></div>
    <div id="hud-stats">
      <div id="hud-name"></div>
      <div style="display:flex;align-items:center;gap:4px"><span style="color:#888;width:18px">HP</span><div class="hbar" style="flex:1"><div class="hfill" id="hud-hp" style="background:#2a2"></div></div><span style="color:#aaa;font-size:10px;width:46px;text-align:right" id="hud-hpn"></span></div>
      <div style="margin-top:3px;color:#999" id="hud-sub"></div>
    </div>
  </div>
  <div id="hud-btns"></div>
</div>
<div id="cutin">
  <div id="cut-flash"></div>
  <div style="display:flex;align-items:center;justify-content:center">
    <div class="cf" id="cf-l"><span class="cf-emoji" id="cfl-e"></span><div class="cf-name" id="cfl-n"></div><div class="cf-hp" id="cfl-hp"></div></div>
    <div id="cut-vs">⚔️</div>
    <div class="cf" id="cf-r"><span class="cf-emoji" id="cfr-e"></span><div class="cf-name" id="cfr-n" style="color:#e74c3c"></div><div class="cf-hp" id="cfr-hp"></div></div>
  </div>
  <div id="cut-msg"></div>
  <div id="cut-dmg"></div>
</div>
<div id="popup"><div id="pop-t"></div><div id="pop-b"></div><button class="gb gb2" style="margin-top:10px" onclick="closePopup()">확인</button></div>

<!-- TITLE -->
<div id="title-ov" class="ov on">
  <div class="au">
    <div style="font-size:11px;letter-spacing:6px;color:#8a7a6a;margin-bottom:8px">TACTICAL RPG</div>
    <h1 class="gt">한국사 영웅전</h1>
    <div class="gs">단군에서 이순신까지 — 전장의 역사를 체험하라</div>
    <div style="margin-top:24px;display:flex;flex-direction:column;gap:10px;align-items:center">
      <button class="gb" onclick="startGame()">⚔️ 출진</button>
      <button class="gb gb2" onclick="showTeam()">🎭 제작팀</button>
    </div>
    <div style="margin-top:30px;font-size:10px;color:#555;line-height:2.2;max-width:280px;margin-left:auto;margin-right:auto">
      ▸ 아군 터치 → 파란 범위 내 이동<br>
      ▸ 이동 후 → 공격/스킬/대기 선택<br>
      ▸ 적 인접 시 공격, 원거리 스킬 가능<br>
      ▸ 적 전멸 = 승리!
    </div>
  </div>
</div>
<!-- STORY -->
<div id="story-ov" class="ov">
  <div class="au" style="max-width:420px;width:100%">
    <div style="font-size:10px;letter-spacing:5px;color:#8a7a6a" id="s-label"></div>
    <div style="font-size:12px;font-weight:700;margin:4px 0" id="s-year"></div>
    <h2 style="font-size:clamp(16px,4.5vw,22px);font-weight:900;margin-bottom:2px;background:linear-gradient(180deg,#f4e4c1,#c4956a);-webkit-background-clip:text;-webkit-text-fill-color:transparent" id="s-title"></h2>
    <div class="sbox" id="s-box"><span id="s-text"></span></div>
    <button class="gb" id="s-btn" style="padding:11px 28px;font-size:13px">다음 ▶</button>
    <div class="dots" id="s-dots"></div>
  </div>
</div>
<!-- VICTORY -->
<div id="vic-ov" class="ov">
  <div class="au" style="max-width:380px">
    <div style="font-size:44px;margin-bottom:6px">🏆</div>
    <h2 style="font-size:22px;font-weight:900;background:linear-gradient(180deg,#f4d03f,#c4956a);-webkit-background-clip:text;-webkit-text-fill-color:transparent">전투 승리!</h2>
    <div style="background:#151520;border:1px solid #c4956a44;border-radius:10px;padding:12px;margin:10px 0;font-size:15px;font-weight:700;color:#f4d03f" id="v-reward"></div>
    <div style="background:#0a0a14;border:1px solid #fff1;border-radius:10px;padding:12px;text-align:left;font-size:11px;color:#aaa;line-height:1.8;margin-bottom:10px" id="v-hist"></div>
    <button class="gb" id="v-btn" style="padding:11px 28px;font-size:13px"></button>
  </div>
</div>
<!-- LOSE -->
<div id="lose-ov" class="ov">
  <div class="au"><div style="font-size:44px;margin-bottom:8px">💀</div>
  <h2 style="font-size:22px;font-weight:900;color:#e74c3c">패배...</h2>
  <p style="font-size:12px;color:#888;margin:10px 0">역사는 끝나지 않았다. 다시!</p>
  <button class="gb" onclick="retry()">다시 도전</button></div>
</div>
<!-- TEAM -->
<div id="team-ov" class="ov">
  <h2 style="font-size:20px;margin-bottom:8px;background:linear-gradient(180deg,#f4e4c1,#c4956a);-webkit-background-clip:text;-webkit-text-fill-color:transparent">🎭 제작팀 (8인)</h2>
  <div class="tg" id="tg"></div>
  <button class="gb gb2" style="margin:14px 0 20px" onclick="hideOv('team-ov')">← 돌아가기</button>
</div>
<!-- END -->
<div id="end-ov" class="ov">
  <div class="au" style="max-width:400px">
    <div style="font-size:40px;margin-bottom:8px">🇰🇷</div>
    <h1 class="gt" style="font-size:clamp(22px,5vw,30px)">한국사 영웅전 — 완결</h1>
    <div style="font-size:12px;color:#8a7a6a;line-height:2;margin:10px 0 16px">단군(BC 2333)부터 이순신(1592)까지<br>약 4,000년의 역사를 함께 걸었습니다.</div>
    <div style="font-size:11px;color:#555;font-style:italic;margin-bottom:14px">"역사를 잊은 민족에게 미래는 없다" — 신채호</div>
    <button class="gb" onclick="hideOv('end-ov');showOv('title-ov')">처음으로</button>
  </div>
</div>

// ═══════════════════════════════════════
// ENGINE STATE
// ═══════════════════════════════════════
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
let W,H,COLS=8,ROWS=8,CELL,OX,OY;
let ci=0,si=0; // chapter, story index
let units=[],obs=[];
let phase='title'; // title,story,pselect,pmove,paction,patk_target,enemy,cutscene
let sel=null,mvR=[],atkR=[],atkMode=null,atkSkill=null;
let turn=1,items=3;
let popCb=null;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W;cv.height=H;
  CELL=Math.min(Math.floor((W-12)/COLS),Math.floor((H-130)/ROWS),52);
  OX=Math.floor((W-COLS*CELL)/2);
  OY=Math.floor((H-ROWS*CELL)/2)+6;
  draw();
}
window.addEventListener('resize',resize);
resize();

// helpers
function showOv(id){document.getElementById(id).classList.add('on')}
function hideOv(id){document.getElementById(id).classList.remove('on')}
function guide(t){document.getElementById('guide').textContent=t}
function dist(a,b){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y)}

function showStory(){
  si=0;const c=CH[ci];
  document.getElementById('s-label').textContent=`CHAPTER ${c.id} · ${c.era}`;
  document.getElementById('s-year').textContent=c.year;
  document.getElementById('s-year').style.color=c.color;
  document.getElementById('s-title').textContent=c.title;
  document.getElementById('story-ov').style.background=`linear-gradient(180deg,${c.color}22,#0a0a14ee)`;
  document.getElementById('s-box').style.borderColor=c.color+'44';
  renderSL();showOv('story-ov');
}
function renderSL(){
  const lines=CH[ci].story,t=lines[si],el=document.getElementById('s-text');
  el.textContent=t;el.className=t.startsWith('▶')?'shl':'';
  const btn=document.getElementById('s-btn');
  if(si>=lines.length-1){btn.textContent='⚔️ 전투 개시!';btn.onclick=()=>{hideOv('story-ov');initBattle();};}
  else{btn.textContent='다음 ▶';btn.onclick=()=>{si++;renderSL();};}
  document.getElementById('s-dots').innerHTML=lines.map((_,i)=>`<div class="dot${i<=si?' on':''}"></div>`).join('');
}

// ═══════════════════════════════════════
// BATTLE INIT
// ═══════════════════════════════════════
function initBattle(){
  const c=CH[ci];units=[];obs=[];
  // allies - formation on left (column shape)
  c.allies.forEach((a,i)=>{
    const row=Math.floor((ROWS-c.allies.length)/2)+i;
    units.push({...a,id:'a'+i,team:'ally',x:1,y:Math.min(Math.max(row,0),ROWS-1),acted:false,skills:a.skills?a.skills.map(s=>({...s})):[]});
  });
  // enemies - formation on right
  c.enemies.forEach((e,i)=>{
    const row=Math.floor((ROWS-c.enemies.length)/2)+i;
    units.push({...e,id:'e'+i,team:'enemy',x:COLS-2,y:Math.min(Math.max(row,0),ROWS-1),acted:false});
  });
  // obstacles (2-4)
  const numObs=2+Math.floor(Math.random()*3);
  for(let i=0;i<numObs;i++){
    let ox,oy,tries=0;
    do{ox=3+Math.floor(Math.random()*(COLS-6));oy=Math.floor(Math.random()*ROWS);tries++;}
    while(tries<40&&(units.some(u=>u.x===ox&&u.y===oy)||obs.some(o=>o.x===ox&&o.y===oy)));
    if(tries<40)obs.push({x:ox,y:oy});
  }
  turn=1;items=3;sel=null;mvR=[];atkR=[];
  document.getElementById('tb-era').textContent=`CH.${c.id} ${c.era} (${c.year})`;
  startPTurn();
}

function startPTurn(){
  units.filter(u=>u.team==='ally'&&u.hp>0).forEach(u=>u.acted=false);
  document.getElementById('tb-info').textContent=`턴 ${turn} · 아군`;
  phase='pselect';sel=null;mvR=[];atkR=[];
  hideHud();guide('아군을 터치하여 선택');
  draw();
  if(!units.some(u=>u.team==='ally'&&u.hp>0&&!u.acted))endPTurn();
}

// ═══════════════════════════════════════
// DRAWING
// ═══════════════════════════════════════
const BG_DRAW={
  grass(cx){
    // green field with subtle hills
    for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++){
      const px=OX+x*CELL,py=OY+y*CELL;
      const g=(x+y)%2===0?'#3a6a3a':'#336633';
      cx.fillStyle=g;cx.fillRect(px,py,CELL,CELL);
      // grass detail
      if(Math.random()>.7){cx.fillStyle='#2d5a2d';cx.fillRect(px+CELL*.3,py+CELL*.6,2,CELL*.25);}
    }
    // distant mountains
    cx.fillStyle='#2a4a2a55';
    cx.beginPath();cx.moveTo(OX,OY);cx.lineTo(OX+COLS*CELL*.3,OY-10);cx.lineTo(OX+COLS*CELL*.6,OY);cx.fill();
  },
  autumn(cx){
    for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++){
      const px=OX+x*CELL,py=OY+y*CELL;
      cx.fillStyle=(x+y)%2===0?'#5a4430':'#4d3a28';cx.fillRect(px,py,CELL,CELL);
      if(Math.random()>.8){cx.fillStyle='#6a3a1a';cx.font='8px serif';cx.fillText('🍂',px+Math.random()*CELL,py+Math.random()*CELL);}
    }
  },
  river(cx){
    for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++){
      const px=OX+x*CELL,py=OY+y*CELL;
      const isRiver=x>=3&&x<=4;
      cx.fillStyle=isRiver?((y%2===0)?'#1a4a7a':'#1f5080'):(x+y)%2===0?'#3a5a3a':'#2f4f2f';
      cx.fillRect(px,py,CELL,CELL);
      if(isRiver&&Math.random()>.6){cx.fillStyle='#2a6aaa44';cx.fillRect(px,py+CELL*.4,CELL,3);}
    }
  },
  castle(cx){
    for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++){
      const px=OX+x*CELL,py=OY+y*CELL;
      const isWall=x===2;
      cx.fillStyle=isWall?'#6a6a5a':(x<2)?((x+y)%2===0?'#4a4a3a':'#3a3a30'):(x+y)%2===0?'#4a5a3a':'#3a4a30';
      cx.fillRect(px,py,CELL,CELL);
      if(isWall){cx.fillStyle='#8a8a7a';cx.fillRect(px,py,CELL,3);cx.fillRect(px,py+CELL-3,CELL,3);}
    }
  },
  sea(cx){
    for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++){
      const px=OX+x*CELL,py=OY+y*CELL;
      const wave=Math.sin((x+y)*0.8)*0.15;
      const r=10+wave*5,g=40+y*3+wave*10,b=70+x*2;
      cx.fillStyle=`rgb(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)})`;
      cx.fillRect(px,py,CELL,CELL);
      // wave lines
      if((x+y)%3===0){cx.strokeStyle='#ffffff11';cx.beginPath();cx.moveTo(px,py+CELL/2);cx.quadraticCurveTo(px+CELL/2,py+CELL/2-4,px+CELL,py+CELL/2);cx.stroke();}
    }
  }
};

function draw(){
  cx.fillStyle='#0a0a14';cx.fillRect(0,0,W,H);
  if(phase==='title')return;
  const c=CH[ci];
  // background terrain
  const bgFn=BG_DRAW[c.bg];if(bgFn)bgFn(cx);
  // grid lines
  cx.strokeStyle='#00000044';
  for(let x=0;x<=COLS;x++){cx.beginPath();cx.moveTo(OX+x*CELL,OY);cx.lineTo(OX+x*CELL,OY+ROWS*CELL);cx.stroke();}
  for(let y=0;y<=ROWS;y++){cx.beginPath();cx.moveTo(OX,OY+y*CELL);cx.lineTo(OX+COLS*CELL,OY+y*CELL);cx.stroke();}
  // move range
  mvR.forEach(({x,y})=>{
    cx.fillStyle='rgba(80,180,255,0.28)';cx.fillRect(OX+x*CELL+1,OY+y*CELL+1,CELL-2,CELL-2);
    cx.strokeStyle='rgba(80,180,255,0.55)';cx.lineWidth=2;cx.strokeRect(OX+x*CELL+2,OY+y*CELL+2,CELL-4,CELL-4);cx.lineWidth=1;
  });
  // attack range
  atkR.forEach(u=>{
    cx.fillStyle='rgba(255,50,50,0.3)';cx.fillRect(OX+u.x*CELL+1,OY+u.y*CELL+1,CELL-2,CELL-2);
    cx.strokeStyle='rgba(255,50,50,0.6)';cx.lineWidth=2;cx.strokeRect(OX+u.x*CELL+2,OY+u.y*CELL+2,CELL-4,CELL-4);cx.lineWidth=1;
  });
  // obstacles
  obs.forEach(o=>{
    cx.fillStyle='#00000044';cx.fillRect(OX+o.x*CELL,OY+o.y*CELL,CELL,CELL);
    cx.font=`${CELL*.45}px serif`;cx.textAlign='center';cx.textBaseline='middle';
    const obsE=c.bg==='sea'?'🌊':c.bg==='river'?'🪨':c.bg==='castle'?'🏛️':'🌲';
    cx.fillText(obsE,OX+o.x*CELL+CELL/2,OY+o.y*CELL+CELL/2);
  });
  // units
  units.filter(u=>u.hp>0).forEach(u=>{
    const px=OX+u.x*CELL,py=OY+u.y*CELL;
    const lk=u.look||{};
    // unit background (army color)
    cx.fillStyle=(lk.bg||'#333')+'88';
    cx.fillRect(px+2,py+2,CELL-4,CELL-4);
    // border
    cx.strokeStyle=lk.border||'#888';cx.lineWidth=2;
    cx.strokeRect(px+2,py+2,CELL-4,CELL-4);cx.lineWidth=1;
    // selected glow
    if(sel&&sel.id===u.id){
      cx.strokeStyle='#FFD700';cx.lineWidth=3;
      cx.strokeRect(px+1,py+1,CELL-2,CELL-2);cx.lineWidth=1;
    }
    // team indicator stripe
    cx.fillStyle=u.team==='ally'?'#27ae6088':'#e74c3c88';
    cx.fillRect(px+2,py+2,CELL-4,4);
    // emoji
    cx.font=`${CELL*.5}px serif`;cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(u.emoji,px+CELL/2,py+CELL/2-1);
    // HP bar
    const bw=CELL-8,bh=4,bx=px+4,by=py+CELL-8;
    cx.fillStyle='#000';cx.fillRect(bx-1,by-1,bw+2,bh+2);
    cx.fillStyle='#222';cx.fillRect(bx,by,bw,bh);
    cx.fillStyle=u.team==='ally'?'#2ecc71':'#e74c3c';
    cx.fillRect(bx,by,bw*Math.max(0,u.hp/u.mhp),bh);
    // acted overlay
    if(u.team==='ally'&&u.acted){cx.fillStyle='rgba(0,0,0,0.5)';cx.fillRect(px+2,py+2,CELL-4,CELL-4);}
    // name (small)
    cx.font=`bold ${Math.max(8,CELL*.17)}px sans-serif`;cx.fillStyle='#fff';cx.textBaseline='bottom';
    cx.fillText(u.name.length>3?u.name.slice(0,3):u.name,px+CELL/2,py+CELL-9);
    cx.textBaseline='middle';
  });
}

// ═══════════════════════════════════════
// INPUT
// ═══════════════════════════════════════
cv.addEventListener('click',onClick);
cv.addEventListener('touchend',e=>{e.preventDefault();onClick({clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY});});

function onClick(e){
  const gx=Math.floor((e.clientX-OX)/CELL),gy=Math.floor((e.clientY-OY)/CELL);
  if(gx<0||gx>=COLS||gy<0||gy>=ROWS)return;

  if(phase==='pselect'){
    const u=aliveAt(gx,gy,'ally');
    if(u&&!u.acted)selectUnit(u);
  }
  else if(phase==='pmove'){
    if(mvR.some(m=>m.x===gx&&m.y===gy)){
      moveUnit(gx,gy);
    } else {
      const u=aliveAt(gx,gy,'ally');
      if(u&&!u.acted)selectUnit(u);
      else{sel=null;mvR=[];phase='pselect';hideHud();guide('아군을 터치하여 선택');draw();}
    }
  }
  else if(phase==='patk_target'){
    const tgt=atkR.find(u=>u.x===gx&&u.y===gy);
    if(tgt)execAttack(tgt);
  }
}

function aliveAt(x,y,team){return units.find(u=>u.hp>0&&u.x===x&&u.y===y&&(!team||u.team===team));}

// ═══════════════════════════════════════
// PLAYER ACTIONS
// ═══════════════════════════════════════
function selectUnit(u){
  sel=u;phase='pmove';
  mvR=calcMoveRange(u);atkR=[];
  showHud(u);showHudBtns([]);
  guide(`${u.name} (${u.title}) — 이동할 칸 터치`);
  draw();
}

function calcMoveRange(u){
  const range=[],vis=new Set();
  const q=[{x:u.x,y:u.y,s:0}];vis.add(u.x+','+u.y);
  while(q.length){
    const c=q.shift();
    if(c.s>0&&!aliveAt(c.x,c.y)&&!obs.some(o=>o.x===c.x&&o.y===c.y))range.push({x:c.x,y:c.y});
    if(c.s<u.mov){
      [{dx:-1,dy:0},{dx:1,dy:0},{dx:0,dy:-1},{dx:0,dy:1}].forEach(d=>{
        const nx=c.x+d.dx,ny=c.y+d.dy;
        if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&!vis.has(nx+','+ny)&&!obs.some(o=>o.x===nx&&o.y===ny)){
          const blocker=aliveAt(nx,ny);
          if(!blocker||blocker.team===u.team){vis.add(nx+','+ny);q.push({x:nx,y:ny,s:c.s+1});}
        }
      });
    }
  }
  return range;
}

function moveUnit(tx,ty){
  sel.x=tx;sel.y=ty;mvR=[];
  phase='paction';
  // find enemies in range for basic attack and skills
  const maxRng=Math.max(sel.rng||1,...(sel.skills||[]).filter(s=>s.dmg).map(s=>s.rng||1));
  const nearEnemies=units.filter(e=>e.team==='enemy'&&e.hp>0&&dist(sel,e)<=maxRng);
  showHud(sel);
  showActionBtns(nearEnemies);
  guide(nearEnemies.length?'행동을 선택하세요':'공격 범위 내 적 없음 — 대기/스킬/아이템');
  draw();
}

function showActionBtns(enemies){
  let html='';
  const hasAdj=enemies.some(e=>dist(sel,e)<=(sel.rng||1));
  if(hasAdj)html+=`<button class="ba" onclick="startAtk('basic')">⚔️ 공격</button>`;
  (sel.skills||[]).forEach((sk,i)=>{
    if(sk.heal){
      html+=`<button class="bs" onclick="useHeal(${i})">💚 ${sk.n}</button>`;
    } else {
      const hasTarget=enemies.some(e=>dist(sel,e)<=(sk.rng||1));
      html+=`<button class="bs" ${hasTarget?'':"disabled"} onclick="startAtk('skill',${i})">✨ ${sk.n}</button>`;
    }
  });
  if(items>0)html+=`<button class="bi" onclick="useItem()">🧪 약(${items})</button>`;
  html+=`<button class="bw" onclick="doWait()">⏳ 대기</button>`;
  document.getElementById('hud-btns').innerHTML=html;
}

function startAtk(mode,si){
  atkMode=mode;atkSkill=si!=null?si:null;
  const rng=mode==='skill'?sel.skills[si].rng||1:sel.rng||1;
  atkR=units.filter(e=>e.team==='enemy'&&e.hp>0&&dist(sel,e)<=rng);
  if(atkR.length===1){execAttack(atkR[0]);return;}
  phase='patk_target';
  guide('공격할 적을 터치!');
  draw();
}

function execAttack(tgt){
  phase='cutscene';atkR=[];
  let dmg,skName;
  if(atkMode==='skill'&&atkSkill!=null){
    const sk=sel.skills[atkSkill];
    dmg=Math.max(1,sk.dmg-tgt.def)+Math.floor(Math.random()*5);
    skName=sk.n;
  }else{
    dmg=Math.max(1,sel.atk-tgt.def)+Math.floor(Math.random()*4);
    skName='공격';
  }
  showCutin(sel,tgt,dmg,skName,()=>{
    // counter?
    if(tgt.hp>0&&dist(sel,tgt)<=(tgt.rng||1)){
      const cdmg=Math.max(1,tgt.atk-sel.def-2)+Math.floor(Math.random()*3);
      setTimeout(()=>showCutin(tgt,sel,cdmg,'반격',()=>finishAct()),200);
    }else finishAct();
  });
}

function useHeal(si){
  const sk=sel.skills[si];
  sel.hp=Math.min(sel.mhp,sel.hp+sk.heal);
  showPopup('회복',`${sk.n}!\nHP ${sk.heal} 회복!`,()=>finishAct());
}
function useItem(){
  if(items<=0)return;items--;
  sel.hp=Math.min(sel.mhp,sel.hp+20);
  showPopup('아이템',`회복약 사용!\nHP 20 회복! (남은 ${items}개)`,()=>finishAct());
}
function doWait(){finishAct();}

function finishAct(){
  if(sel)sel.acted=true;
  sel=null;mvR=[];atkR=[];hideHud();
  draw();
  if(!units.some(e=>e.team==='enemy'&&e.hp>0)){phase='victory';setTimeout(showVic,500);return;}
  if(!units.some(a=>a.team==='ally'&&a.hp>0)){phase='gameover';setTimeout(()=>showOv('lose-ov'),500);return;}
  if(units.some(a=>a.team==='ally'&&a.hp>0&&!a.acted)){
    phase='pselect';guide('다음 아군을 선택');draw();
  }else endPTurn();
}

// ═══════════════════════════════════════
// ENEMY TURN
// ═══════════════════════════════════════
function endPTurn(){
  phase='enemy';guide('적 턴...');
  document.getElementById('tb-info').textContent=`턴 ${turn} · 적군`;
  hideHud();draw();
  const enemies=units.filter(u=>u.team==='enemy'&&u.hp>0);
  let idx=0;
  function next(){
    if(idx>=enemies.length){turn++;startPTurn();return;}
    const e=enemies[idx];idx++;
    if(e.hp<=0){next();return;}
    const allies=units.filter(u=>u.team==='ally'&&u.hp>0);
    if(!allies.length){phase='gameover';showOv('lose-ov');return;}
    let nearest=allies[0],md=999;
    allies.forEach(a=>{const d=dist(e,a);if(d<md){md=d;nearest=a;}});
    if(md<=(e.rng||1)){
      eAtk(e,nearest,next);
    }else{
      const mr=calcMoveRange(e);
      let best=null,bd=999;
      mr.forEach(c=>{const d=Math.abs(c.x-nearest.x)+Math.abs(c.y-nearest.y);if(d<bd){bd=d;best=c;}});
      if(best){e.x=best.x;e.y=best.y;}
      draw();
      if(dist(e,nearest)<=(e.rng||1))setTimeout(()=>eAtk(e,nearest,next),350);
      else setTimeout(next,250);
    }
  }
  setTimeout(next,500);
}

function eAtk(atk,def,cb){
  phase='cutscene';
  const dmg=Math.max(1,atk.atk-def.def)+Math.floor(Math.random()*4);
  showCutin(atk,def,dmg,atk.name+'의 공격',()=>{
    draw();
    if(!units.some(a=>a.team==='ally'&&a.hp>0)){phase='gameover';setTimeout(()=>showOv('lose-ov'),400);return;}
    phase='enemy';setTimeout(cb,200);
  });
}

// ═══════════════════════════════════════
// CUTIN ANIMATION
// ═══════════════════════════════════════
function showCutin(atk,def,dmg,label,cb){
  const el=document.getElementById('cutin');el.classList.add('on');
  const isAllyAtk=atk.team==='ally';
  document.getElementById('cfl-e').textContent=atk.emoji;
  document.getElementById('cfl-n').textContent=atk.name;
  document.getElementById('cfl-n').style.color=isAllyAtk?'#e8dcc8':'#e74c3c';
  document.getElementById('cfl-hp').textContent=`HP ${atk.hp}/${atk.mhp}`;
  document.getElementById('cfr-e').textContent=def.emoji;
  document.getElementById('cfr-n').textContent=def.name;
  document.getElementById('cfr-n').style.color=isAllyAtk?'#e74c3c':'#e8dcc8';
  document.getElementById('cfr-hp').textContent=`HP ${def.hp}/${def.mhp}`;
  document.getElementById('cut-msg').textContent=label+'!';
  document.getElementById('cut-dmg').textContent='';
  // animate hit
  setTimeout(()=>{
    document.getElementById('cf-l').classList.add('hl');
    document.getElementById('cf-r').classList.add('hr');
    // flash
    const fl=document.getElementById('cut-flash');fl.style.animation='flash .3s ease';
    setTimeout(()=>fl.style.animation='',300);
  },350);
  setTimeout(()=>{
    def.hp=Math.max(0,def.hp-dmg);
    document.getElementById('cut-dmg').textContent=`💥 ${dmg} 데미지!`;
    document.getElementById('cut-dmg').style.animation='dmgPop .4s ease';
    document.getElementById('cfr-hp').textContent=`HP ${def.hp}/${def.mhp}`;
    if(def.hp<=0)document.getElementById('cut-msg').textContent=def.name+' 격파!';
  },650);
  setTimeout(()=>{
    el.classList.remove('on');
    document.getElementById('cf-l').classList.remove('hl');
    document.getElementById('cf-r').classList.remove('hr');
    document.getElementById('cut-dmg').style.animation='';
    draw();cb();
  },1500);
}

// ═══════════════════════════════════════
// HUD
// ═══════════════════════════════════════
function showHud(u){
  document.getElementById('hud').style.display='block';
  document.getElementById('hud-portrait').textContent=u.emoji;
  document.getElementById('hud-portrait').style.borderColor=u.team==='ally'?'#27ae60':'#e74c3c';
  document.getElementById('hud-name').textContent=`${u.name}`;
  document.getElementById('hud-hp').style.width=(u.hp/u.mhp*100)+'%';
  document.getElementById('hud-hp').style.background=u.team==='ally'?'#2ecc71':'#e74c3c';
  document.getElementById('hud-hpn').textContent=u.hp+'/'+u.mhp;
  document.getElementById('hud-sub').textContent=`${u.title} | ATK ${u.atk} DEF ${u.def} MOV ${u.mov} RNG ${u.rng||1}`;
}
function showHudBtns(html){document.getElementById('hud-btns').innerHTML=html;}
function hideHud(){document.getElementById('hud').style.display='none';}

// ═══════════════════════════════════════
// POPUP
// ═══════════════════════════════════════
function showPopup(t,b,cb){
  document.getElementById('pop-t').textContent=t;
  document.getElementById('pop-b').textContent=b;
  document.getElementById('popup').style.display='block';
  popCb=cb;
}
function closePopup(){
  document.getElementById('popup').style.display='none';
  if(popCb){const c=popCb;popCb=null;c();}
  draw();
}

// ═══════════════════════════════════════
// VICTORY / END
// ═══════════════════════════════════════
function showVic(){
  const c=CH[ci];
  document.getElementById('v-reward').textContent='🎁 '+c.reward;
  document.getElementById('v-hist').innerHTML=`<span style="color:#c4956a;font-weight:700">📖 역사 포인트</span><br>`+c.story[c.story.length-1];
  const btn=document.getElementById('v-btn');
  if(ci<CH.length-1){
    btn.textContent='다음 챕터 ▶';
    btn.onclick=()=>{ci++;hideOv('vic-ov');showStory();};
  }else{
    btn.textContent='엔딩 보기';
    btn.onclick=()=>{hideOv('vic-ov');showOv('end-ov');};
  }
  showOv('vic-ov');
}
function retry(){hideOv('lose-ov');initBattle();}

// ═══════════════════════════════════════
// START
// ═══════════════════════════════════════
function startGame(){ci=0;hideOv('title-ov');showStory();}
draw();
</script>
