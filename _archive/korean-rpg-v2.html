<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>한국사 영웅전 v2 — 1부 고조선 · 챕터1 환웅편</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
body{overflow:hidden;background:#0a0608;font-family:'Noto Serif KR',serif;color:#e8dcc8;touch-action:none}
canvas{display:block;position:absolute;top:0;left:0}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#ui>*{pointer-events:auto}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;height:auto;padding:4px 8px;background:linear-gradient(180deg,#0a0608ee,#0a060800);display:none;pointer-events:none}
#hud-stage{font-size:10px;color:#c4956a;font-weight:700;letter-spacing:2px}
#hud-info{font-size:9px;color:#888}
.hud-party{display:flex;gap:4px;margin-top:2px;flex-wrap:wrap}
.hud-char{background:#1a1428cc;border:1px solid #5a4a3a;border-radius:4px;padding:2px 6px;font-size:9px;min-width:80px}
.hud-char-name{color:#FFD700;font-weight:700;font-size:10px}
.hud-bar{height:4px;background:#1a1a2e;border-radius:2px;overflow:hidden;margin:1px 0}
.hud-bar-hp{height:100%;background:#4a2;border-radius:2px;transition:width .3s}
.hud-bar-mp{height:100%;background:#26a;border-radius:2px;transition:width .3s}

/* Minimap */
#minimap{position:absolute;top:4px;right:4px;width:100px;height:100px;border:1px solid #5a4a3a;border-radius:4px;background:#0a0608cc;display:none}

/* Dialogue */
#dlg{position:fixed;bottom:0;left:0;right:0;display:none;padding:6px;z-index:50}
#dlg-box{background:linear-gradient(180deg,#1a1428ee,#0e0a18f8);border:2px solid #8a7a5a;border-radius:8px;padding:10px 12px;max-width:520px;margin:0 auto;display:flex;gap:10px;align-items:flex-start}
#dlg-portrait{width:48px;height:48px;border-radius:6px;border:2px solid #c4956a;background:#1a1428;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
#dlg-content{flex:1}
#dlg-speaker{font-size:12px;font-weight:700;color:#FFD700;margin-bottom:2px}
#dlg-text{font-size:13px;line-height:1.8;min-height:32px}
#dlg-next{font-size:9px;color:#888;text-align:right;margin-top:2px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

/* Battle UI */
#battle-ui{position:fixed;bottom:0;left:0;right:0;display:none;z-index:40;padding:4px}
#battle-actions{display:flex;gap:3px;max-width:520px;margin:0 auto;flex-wrap:wrap}
#battle-actions button{flex:1;min-width:60px;padding:8px 4px;border:1px solid #5a3a1a;border-radius:5px;font-family:inherit;font-size:11px;font-weight:700;color:#e8dcc8;cursor:pointer;transition:all .1s}
#battle-actions button:active{transform:scale(.95)}
#battle-actions button:disabled{opacity:.3}
.btn-atk{background:#6B1A0A}.btn-def{background:#1a3a5c}.btn-skill{background:#5a3a6a}.btn-item{background:#2a5a2a}
#battle-info{text-align:center;font-size:10px;color:#c4956a;margin-bottom:4px;max-width:520px;margin:0 auto 4px}
#battle-turn-order{display:flex;gap:2px;justify-content:center;margin-bottom:4px;max-width:520px;margin:0 auto 4px}
.turn-marker{font-size:10px;padding:1px 4px;border-radius:3px;background:#1a1428;border:1px solid #5a4a3a}
.turn-marker.active{border-color:#FFD700;background:#2a2438}
.turn-marker.ally{color:#4af}.turn-marker.enemy{color:#f66}

/* Skill selection */
#skill-menu{display:none;position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#1a1428ee;border:1px solid #8a7a5a;border-radius:8px;padding:8px;z-index:45;max-width:300px;width:90%}
#skill-menu h4{color:#c4956a;font-size:11px;margin-bottom:4px}
.skill-btn{display:block;width:100%;padding:6px 8px;margin:2px 0;border:1px solid #5a3a1a;border-radius:4px;background:#2a2438;font-family:inherit;font-size:11px;color:#e8dcc8;cursor:pointer;text-align:left}
.skill-btn:hover{background:#3a3448}
.skill-btn:disabled{opacity:.3}

/* Item selection */
#item-menu{display:none;position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#1a1428ee;border:1px solid #8a7a5a;border-radius:8px;padding:8px;z-index:45;max-width:300px;width:90%}
#item-menu h4{color:#c4956a;font-size:11px;margin-bottom:4px}
.item-btn{display:block;width:100%;padding:6px 8px;margin:2px 0;border:1px solid #2a5a2a;border-radius:4px;background:#1a2a1a;font-family:inherit;font-size:11px;color:#e8dcc8;cursor:pointer;text-align:left}

/* Target selection */
#target-info{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1428ee;border:1px solid #8a7a5a;border-radius:8px;padding:12px;z-index:45;font-size:12px;text-align:center}

/* Status screen */
#status-screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0608f0;z-index:60;overflow-y:auto;padding:16px}
#status-screen h2{color:#c4956a;text-align:center;margin-bottom:12px}
.status-card{background:#1a1428;border:1px solid #5a4a3a;border-radius:8px;padding:10px;margin:8px auto;max-width:400px}
.status-card h3{color:#FFD700;font-size:14px;margin-bottom:6px}
.stat-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid #2a2438}
.equip-row{font-size:10px;color:#aaa;padding:2px 0}

/* Save/Load */
#save-screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0608f0;z-index:60;padding:16px}
#save-screen h2{color:#c4956a;text-align:center;margin-bottom:12px}
.save-slot{background:#1a1428;border:1px solid #5a4a3a;border-radius:8px;padding:12px;margin:8px auto;max-width:400px;cursor:pointer}
.save-slot:hover{border-color:#c4956a}
.save-slot h4{color:#FFD700;font-size:13px}
.save-slot p{color:#888;font-size:10px}

/* Victory / Defeat */
#victory-screen,#defeat-screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0608ee;z-index:70;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:16px}
#victory-screen.on,#defeat-screen.on{display:flex}
.victory-rewards{background:#1a1428;border:1px solid #5a4a3a;border-radius:8px;padding:12px;margin:12px auto;max-width:300px;text-align:left}
.reward-item{font-size:11px;padding:2px 0;color:#aaa}
.reward-item span{color:#FFD700}

/* Menu overlay */
#menu-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0608dd;z-index:55;flex-direction:column;align-items:center;justify-content:center;gap:8px}
#menu-overlay.on{display:flex}
.menu-btn{padding:10px 40px;border:1px solid #5a3a1a;border-radius:6px;font-family:inherit;font-size:14px;font-weight:700;color:#e8dcc8;background:#2a2438;cursor:pointer;min-width:180px}
.menu-btn:hover{background:#3a3448;border-color:#c4956a}

/* Title */
#title-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 50% 40%,#2a1a0a,#0a0608);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
@keyframes glow{0%,100%{text-shadow:0 0 20px #c4956a33}50%{text-shadow:0 0 50px #c4956aaa}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.title-text{font-size:clamp(22px,6vw,42px);font-weight:900;background:linear-gradient(180deg,#f4e4c1,#c4956a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:glow 3s infinite}
.title-sub{font-size:14px;color:#8a7a6a;margin-top:6px;font-style:italic}
.title-btn{padding:12px 30px;border:1px solid #5a3a1a;border-radius:8px;font-family:inherit;font-size:15px;font-weight:700;color:#e8dcc8;background:#6B1A0A;cursor:pointer;letter-spacing:2px;margin-top:16px}
.title-btn:active{transform:scale(.96)}
.title-btn2{background:#2a2a3e;font-size:11px;padding:8px 18px;margin-top:8px}
.title-info{margin-top:16px;font-size:9px;color:#555;line-height:2.2;max-width:280px}

/* Floating damage */
.float-dmg{position:absolute;font-weight:900;pointer-events:none;z-index:30;animation:floatUp .8s ease-out forwards;text-shadow:0 1px 3px #000}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-30px) scale(1.1)}100%{opacity:0;transform:translateY(-50px) scale(.8)}}
.dmg-phys{color:#ff6644;font-size:16px}
.dmg-magic{color:#aa66ff;font-size:16px}
.dmg-heal{color:#44ff66;font-size:16px}
.dmg-crit{color:#ffdd00;font-size:20px}
.dmg-miss{color:#888;font-size:14px}

/* Endurance minigame */
#endurance-game{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0608ee;z-index:65;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:16px}
#endurance-game.on{display:flex}
#endurance-bar{width:200px;height:20px;background:#1a1a2e;border-radius:10px;overflow:hidden;margin:12px auto;border:1px solid #5a4a3a}
#endurance-fill{height:100%;background:linear-gradient(90deg,#c4956a,#FFD700);border-radius:10px;transition:width .3s;width:0%}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <!-- HUD -->
  <div id="hud">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span id="hud-stage">1-1 환인의 뜻</span>
      <span id="hud-info" style="cursor:pointer" onclick="toggleMenu()">☰ 메뉴</span>

      <div class="victory-rewards" id="victory-rewards"></div>

  <!-- Defeat -->
  <div id="defeat-screen">

      <div style="font-size:36px;margin-bottom:6px">💀</div>
      <h2 style="font-size:24px;font-weight:900;color:#e74c3c">패배</h2>
      <p style="color:#888;font-size:12px;margin:8px 0">아군이 모두 쓰러졌습니다...</p>
      <button class="title-btn" onclick="retryStage()">재도전</button>
      <button class="title-btn title-btn2" style="margin-left:8px" onclick="backToTitle()">타이틀로</button>

  <!-- Menu Overlay -->
  <div id="menu-overlay">
    <h3 style="color:#c4956a;margin-bottom:12px">메뉴</h3>
    <button class="menu-btn" onclick="openStatusScreen()">상태 확인</button>

  <!-- Status Screen -->
  <div id="status-screen">
    <h2>파티 상태</h2>
    <div id="status-content"></div>
    <div style="text-align:center;margin-top:12px"><button class="menu-btn" onclick="closeStatusScreen()">닫기</button></div>
  </div>

  <!-- Save Screen -->
  <div id="save-screen">
    <h2 id="save-title">저장</h2>
    <div id="save-slots"></div>
    <div style="text-align:center;margin-top:12px"><button class="menu-btn" onclick="closeSaveScreen()">닫기</button></div>
  </div>

  <!-- Endurance minigame -->
  <div id="endurance-game">
    <h3 style="color:#c4956a">100일 시련</h3>
    <p style="font-size:12px;color:#aaa;margin:8px 0">쑥과 마늘만 먹으며 동굴에서 버텨라!<br>타이밍에 맞춰 터치하여 인내하라!</p>
    <div id="endurance-day" style="font-size:18px;font-weight:900;color:#FFD700;margin:8px 0">1일차</div>

    <div id="endurance-prompt" style="font-size:14px;color:#c4956a;margin:8px 0"></div>
    <button class="title-btn" id="endurance-btn" style="display:none" onclick="enduranceAction()">인내!</button>
  </div>

  <!-- Title -->
  <div id="title-screen">
    <div style="animation:fadeUp .8s ease">
      <div style="font-size:9px;letter-spacing:5px;color:#8a7a6a;margin-bottom:6px">TURN-BASED RPG · BC 2400</div>
      <h1 class="title-text">한국사 영웅전</h1>
      <div class="title-sub">1부 고조선 — 챕터1 환웅편</div>
      <div style="margin-top:16px">
        <button class="title-btn" onclick="startNewGame()">새 게임</button>
      </div>
      <div>
        <button class="title-btn title-btn2" onclick="openSaveScreen('load');document.getElementById('title-screen').style.display='none'">이어하기</button>
      </div>
      <div class="title-info">
        ▸ 턴제 전투: 공격/방어/기술/아이템<br>
        ▸ 병종 상성: 궁병 &gt; 보병 &gt; 기마병 &gt; 궁병<br>
        ▸ 5개 스테이지, 보스전<br>
        ▸ 이동: 방향키/WASD/터치<br>
        ▸ 레벨업 & 장비 시스템
      </div>
    </div>

<script>
// ═══════════════════════════════════════════════
// 한국사 영웅전 v2 — Complete Turn-based RPG
// 1부 고조선 · 챕터1 환웅편 (5 Stages)
// ═══════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap');
const mmCtx = mmCanvas.getContext('2d');

// ═══ CONSTANTS ═══
const TILE = 48;
const ISO_ANGLE = 30 * Math.PI / 180;

// ═══ AUDIO ENGINE ═══
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let musicGain = null;
let sfxGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioCtx();
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.15;
  musicGain.connect(audioCtx.destination);
  sfxGain = audioCtx.createGain();
  sfxGain.gain.value = 0.3;
  sfxGain.connect(audioCtx.destination);
}

function playNote(freq, dur, type='square', gain=sfxGain) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(0.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(g);
  g.connect(gain);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playSfx(type) {
  if (!audioCtx) return;
  switch(type) {
    case 'hit': playNote(200, 0.1, 'sawtooth'); playNote(100, 0.15, 'square'); break;
    case 'crit': playNote(400, 0.05, 'sawtooth'); playNote(600, 0.1, 'square'); playNote(300, 0.15, 'sawtooth'); break;
    case 'heal': playNote(400, 0.1, 'sine'); playNote(500, 0.1, 'sine'); playNote(600, 0.15, 'sine'); break;
    case 'miss': playNote(150, 0.2, 'sine'); break;
    case 'levelup': [400,500,600,800].forEach((f,i) => setTimeout(() => playNote(f, 0.2, 'sine'), i*100)); break;
    case 'victory': [523,659,784,1047].forEach((f,i) => setTimeout(() => playNote(f, 0.3, 'sine'), i*150)); break;
    case 'defeat': [300,250,200,150].forEach((f,i) => setTimeout(() => playNote(f, 0.4, 'sawtooth'), i*200)); break;
    case 'menu': playNote(800, 0.05, 'sine'); break;
    case 'select': playNote(600, 0.08, 'sine'); playNote(900, 0.08, 'sine'); break;
    case 'defend': playNote(300, 0.15, 'triangle'); playNote(400, 0.1, 'triangle'); break;
    case 'skill': playNote(500, 0.05, 'sine'); playNote(700, 0.1, 'sine'); playNote(900, 0.15, 'sine'); break;
  }
}

let bgmInterval = null;
const BGM_PATTERNS = {
  map: [262,294,330,349,330,294,262,247],
  battle: [330,330,392,392,440,392,330,262],
  boss: [220,220,262,220,196,220,262,220],
  victory: [523,523,523,659,784,659,784,1047]
};

function startBGM(pattern) {
  stopBGM();
  if (!audioCtx) return;
  const notes = BGM_PATTERNS[pattern] || BGM_PATTERNS.map;
  let i = 0;
  bgmInterval = setInterval(() => {
    playNote(notes[i % notes.length], 0.25, 'sine', musicGain);
    i++;
  }, 300);
}

function stopBGM() {
  if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

// ═══ GAME STATE ═══
let gameState = {
  mode: 'title', // title, map, dialogue, battle, battle_anim, victory, defeat, menu, status, save, endurance
  stage: 0,
  party: [],
  inventory: [],
  equipment: {},
  gold: 0,
  stageCleared: [false,false,false,false,false],
  // Map state
  mapData: null,
  mapW: 0, mapH: 0,
  playerX: 5, playerY: 5,
  playerDir: 0, // 0=down,1=left,2=up,3=right
  npcs: [],
  chests: [],
  healSpots: [],
  cameraX: 0, cameraY: 0,
  // Battle state
  battleParty: [],
  battleEnemies: [],
  turnOrder: [],
  currentTurnIdx: 0,
  battleAction: null,
  battleTarget: null,
  selectedSkill: null,
  selectedItem: null,
  battlePhase: 'select', // select, target, animate, enemyTurn
  battleAnimTimer: 0,
  battleShake: {x:0,y:0,t:0},
  floatingDmgs: [],
  waveIdx: 0,
  waves: null,
  // Dialogue
  dlgQueue: [],
  dlgIdx: 0,
  dlgCallback: null,
  dlgTyping: false,
  dlgTypedLen: 0,
  dlgTypeTimer: 0,
  // Endurance
  enduranceDay: 0,
  enduranceHP: 100,
  // Save
  saveMode: 'save'
};

// ═══ CHARACTER/CLASS DEFINITIONS ═══
const CLASS_DATA = {
  '궁병': { emoji:'🏹', color:'#2a6a3a', skills: [
    {name:'연사', desc:'3회 연속 공격', mpCost:8, type:'multi', hits:3, power:0.6, target:'single'},
    {name:'화살비', desc:'적 전체 공격', mpCost:15, type:'aoe', power:0.7, target:'all'}
  ]},
  '보병': { emoji:'⚔️', color:'#6a3a2a', skills: [
    {name:'강타', desc:'강력한 일격', mpCost:6, type:'single', power:2.0, target:'single'},
    {name:'방패막기', desc:'아군 전체 방어+50% (1턴)', mpCost:10, type:'buff_def', power:1.5, target:'party'}
  ]},
  '기마병': { emoji:'🐴', color:'#5a4a2a', skills: [
    {name:'돌진', desc:'돌격+기절(1턴)', mpCost:10, type:'charge', power:1.8, stun:true, target:'single'},

// Type advantage: 궁병 > 보병 > 기마병 > 궁병
function getTypeAdvantage(atkClass, defClass) {
  const types = {'궁병':'archer','보병':'infantry','기마병':'cavalry'};
  const a = types[atkClass], d = types[defClass];
  if (!a || !d) return 1.0;
  if ((a==='archer'&&d==='infantry')||(a==='infantry'&&d==='cavalry')||(a==='cavalry'&&d==='archer')) return 1.5;
  if ((a==='infantry'&&d==='archer')||(a==='cavalry'&&d==='infantry')||(a==='archer'&&d==='cavalry')) return 0.75;
  return 1.0;
}

// ═══ CHARACTER FACTORY ═══
function makeChar(id, name, cls, level, isAlly, extraStats={}) {
  const base = {
    id, name, class: cls,
    level,
    exp: 0, expToLevel: level * 30 + 50,
    maxHP: 50 + level*12 + (extraStats.hp||0),
    hp: 50 + level*12 + (extraStats.hp||0),
    maxMP: 20 + level*5 + (extraStats.mp||0),
    mp: 20 + level*5 + (extraStats.mp||0),
    atk: 10 + level*3 + (extraStats.atk||0),
    def: 5 + level*2 + (extraStats.def||0),
    spd: 8 + level*1 + (extraStats.spd||0),
    isAlly,
    alive: true,
    defending: false,
    stunned: false,
    buffs: [], // {type, turns, value}
    weapon: extraStats.weapon || null,
    armor: extraStats.armor || null,
    accessory: extraStats.accessory || null,
    portrait: (CLASS_DATA[cls]||{}).emoji || '🧑'
  };
  // Apply equipment bonuses
  applyEquipStats(base);
  base.hp = base.maxHP;
  base.mp = base.maxMP;
  return base;
}

function applyEquipStats(char) {
  const wep = ITEMS[char.weapon];
  const arm = ITEMS[char.armor];
  const acc = ITEMS[char.accessory];
  if (wep) { char.atk += wep.atk||0; char.def += wep.def||0; char.spd += wep.spd||0; }
  if (arm) { char.atk += arm.atk||0; char.def += arm.def||0; char.spd += arm.spd||0; }
  if (acc) { char.atk += acc.atk||0; char.def += acc.def||0; char.spd += acc.spd||0; char.maxHP += acc.hp||0; char.maxMP += acc.mp||0; }
}

function getSkills(char) {
  return (CLASS_DATA[char.class]||{}).skills || [];
}

// ═══ RESIZE ═══
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ═══ DRAWING HELPERS ═══
function isoX(gx, gy) { return (gx - gy) * TILE * 0.5; }
function isoY(gx, gy) { return (gx + gy) * TILE * 0.25; }

function screenToGrid(sx, sy) {
  const cx = sx - canvas.width/2 + gameState.cameraX;
  const cy = sy - canvas.height/2 + gameState.cameraY;
  const gx = (cx / (TILE*0.5) + cy / (TILE*0.25)) / 2;
  const gy = (cy / (TILE*0.25) - cx / (TILE*0.5)) / 2;
  return {x: Math.round(gx), y: Math.round(gy)};
}

function gridToScreen(gx, gy) {
  return {
    x: isoX(gx, gy) - gameState.cameraX + canvas.width/2,
    y: isoY(gx, gy) - gameState.cameraY + canvas.height/2
  };
}

// Draw isometric tile
function drawTile(gx, gy, color, highlight=null) {
  const s = gridToScreen(gx, gy);
  const hw = TILE * 0.5, hh = TILE * 0.25;
  ctx.beginPath();
  ctx.moveTo(s.x, s.y - hh);
  ctx.lineTo(s.x + hw, s.y);
  ctx.lineTo(s.x, s.y + hh);
  ctx.lineTo(s.x - hw, s.y);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  if (highlight) {
    ctx.fillStyle = highlight;
    ctx.fill();
  }
}

// Draw character sprite (simple but distinctive)
function drawCharSprite(sx, sy, char, scale=1, flash=false) {
  const s = scale * 0.8;
  const isEnemy = !char.isAlly;

  if (flash) {
    ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.02) * 0.5;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(sx, sy + 8*s, 10*s, 4*s, 0, 0, Math.PI*2);
  ctx.fill();

  // Body color based on class
  const clsData = CLASS_DATA[char.class] || {};
  const bodyColor = isEnemy ? '#8B1A1A' : (clsData.color || '#5a4a3a');

  // Legs
  ctx.fillStyle = isEnemy ? '#4a1a1a' : '#6B4226';
  ctx.fillRect(sx - 6*s, sy - 2*s, 4*s, 10*s);
  ctx.fillRect(sx + 2*s, sy - 2*s, 4*s, 10*s);

  // Body
  ctx.fillStyle = bodyColor;
  ctx.fillRect(sx - 8*s, sy - 18*s, 16*s, 18*s);

  // Head
  ctx.fillStyle = '#DEB887';
  ctx.beginPath();
  ctx.arc(sx, sy - 24*s, 6*s, 0, Math.PI*2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#111';
  ctx.fillRect(sx - 3*s, sy - 25*s, 2*s, 2*s);
  ctx.fillRect(sx + 1*s, sy - 25*s, 2*s, 2*s);

  // Class-specific weapon
  if (char.class === '궁병') {
    // Bow
    ctx.strokeStyle = '#5a3a1a';
    ctx.lineWidth = 2*s;
    ctx.beginPath();
    ctx.arc(sx + 12*s, sy - 14*s, 8*s, -Math.PI*0.6, Math.PI*0.6);
    ctx.stroke();
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 1*s;
    ctx.beginPath();
    ctx.moveTo(sx + 12*s, sy - 22*s);
    ctx.lineTo(sx + 12*s, sy - 6*s);
    ctx.stroke();
  } else if (char.class === '기마병') {
    // Spear
    ctx.fillStyle = '#8a7a5a';
    ctx.fillRect(sx + 10*s, sy - 30*s, 2*s, 28*s);
    ctx.fillStyle = '#ccc';
    ctx.beginPath();
    ctx.moveTo(sx + 11*s, sy - 34*s);
    ctx.lineTo(sx + 8*s, sy - 28*s);
    ctx.lineTo(sx + 14*s, sy - 28*s);
    ctx.closePath();
    ctx.fill();
  } else if (char.class === '보병') {
    // Sword + shield
    ctx.fillStyle = '#B87333';
    ctx.fillRect(sx + 10*s, sy - 22*s, 3*s, 16*s);
    ctx.fillStyle = '#8B5A2B';
    ctx.fillRect(sx - 14*s, sy - 18*s, 4*s, 12*s);
  } else {
    // Leader/special - staff
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(sx - 12*s, sy - 32*s, 2*s, 30*s);
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(sx - 11*s, sy - 34*s, 3*s, 0, Math.PI*2);
    ctx.fill();
  }

  // HP bar above
  if (char.alive) {
    const barW = 20*s, barH = 3*s;
    const hpPct = char.hp / char.maxHP;
    ctx.fillStyle = '#111';
    ctx.fillRect(sx - barW/2, sy - 36*s, barW, barH);
    ctx.fillStyle = hpPct > 0.5 ? '#4a2' : hpPct > 0.25 ? '#aa4' : '#a22';
    ctx.fillRect(sx - barW/2, sy - 36*s, barW * hpPct, barH);
  }

  // Enemy red band
  if (isEnemy) {
    ctx.fillStyle = '#CC2222';
    ctx.fillRect(sx - 8*s, sy - 19*s, 16*s, 2*s);
  }

  // Leader crown/helmet
  if (char.class === '신장' || char.isBoss) {
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.moveTo(sx - 5*s, sy - 30*s);
    ctx.lineTo(sx - 3*s, sy - 34*s);
    ctx.lineTo(sx, sy - 31*s);
    ctx.lineTo(sx + 3*s, sy - 34*s);
    ctx.lineTo(sx + 5*s, sy - 30*s);
    ctx.closePath();
    ctx.fill();
  }

  // Stunned indicator
  if (char.stunned) {
    ctx.fillStyle = '#FFD700';
    ctx.font = `${10*s}px serif`;
    ctx.textAlign = 'center';
    ctx.fillText('💫', sx, sy - 38*s);
  }

  // Defending indicator
  if (char.defending) {
    ctx.fillStyle = 'rgba(100,150,255,0.3)';
    ctx.beginPath();
    ctx.arc(sx, sy - 10*s, 14*s, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#88aaff';
    ctx.lineWidth = 1.5*s;
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
}

// ═══ MAP RENDERING ═══
function renderMap() {
  const stage = STAGES[gameState.stage];
  const map = gameState.mapData;
  if (!map) return;
  const mapH = map.length, mapW = map[0].length;

  // Background
  ctx.fillStyle = stage.bgColor || '#0a0608';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Center camera on player
  const ps = {x: isoX(gameState.playerX, gameState.playerY), y: isoY(gameState.playerX, gameState.playerY)};
  gameState.cameraX += (ps.x - gameState.cameraX) * 0.1;
  gameState.cameraY += (ps.y - gameState.cameraY) * 0.1;

  // Draw tiles (back to front)
  for (let gy = 0; gy < mapH; gy++) {
    for (let gx = 0; gx < mapW; gx++) {
      const tile = map[gy][gx];
      let color = TILE_COLORS[tile] || '#333';
      // Add slight variation
      const r = ((gx*7+gy*13)%17)/17;
      const baseR = parseInt(color.slice(1,3),16), baseG = parseInt(color.slice(3,5),16), baseB = parseInt(color.slice(5,7),16);
      const vr = Math.floor(baseR + (r-0.5)*15), vg = Math.floor(baseG + (r-0.5)*15), vb = Math.floor(baseB + (r-0.5)*15);
      color = `rgb(${Math.max(0,Math.min(255,vr))},${Math.max(0,Math.min(255,vg))},${Math.max(0,Math.min(255,vb))})`;

      let hl = null;
      // Highlight heal spots
      const isHeal = gameState.healSpots?.some(h => h.x===gx && h.y===gy);
      if (isHeal) hl = 'rgba(100,255,100,0.15)';
      // Highlight chests
      const chest = gameState.chests?.find(c => c.x===gx && c.y===gy && !c.opened);
      if (chest) hl = 'rgba(255,215,0,0.2)';

      drawTile(gx, gy, color, hl);

      // Draw decorations on forest/mountain
      if (tile === 5) {
        const s = gridToScreen(gx, gy);
        ctx.fillStyle = '#2a5020';
        ctx.beginPath();
        ctx.moveTo(s.x, s.y - 16);
        ctx.lineTo(s.x - 8, s.y - 2);
        ctx.lineTo(s.x + 8, s.y - 2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#3a2010';
        ctx.fillRect(s.x - 1.5, s.y - 4, 3, 6);
      }
      if (tile === 4) {
        const s = gridToScreen(gx, gy);
        ctx.fillStyle = '#6a5a3a';
        ctx.beginPath();
        ctx.moveTo(s.x, s.y - 12);
        ctx.lineTo(s.x - 10, s.y + 2);
        ctx.lineTo(s.x + 10, s.y + 2);
        ctx.closePath();
        ctx.fill();
      }
      if (tile === 9 || tile === 10) {
        const s = gridToScreen(gx, gy);
        ctx.fillStyle = tile===9 ? '#4a3a2a' : '#2a1a20';
        ctx.fillRect(s.x - TILE*0.25, s.y - 10, TILE*0.5, 10);
      }
    }
  }

  // Draw chests
  gameState.chests?.forEach(c => {
    if (c.opened) return;
    const s = gridToScreen(c.x, c.y);
    ctx.fillStyle = '#8B6914';
    ctx.fillRect(s.x - 6, s.y - 8, 12, 8);
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(s.x - 1, s.y - 6, 2, 2);
  });

  // Draw heal spots
  gameState.healSpots?.forEach(h => {
    const s = gridToScreen(h.x, h.y);
    ctx.fillStyle = `rgba(100,255,100,${0.3 + Math.sin(Date.now()*0.003)*0.2})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, 6, 0, Math.PI*2);
    ctx.fill();
  });

  // Draw NPCs
  gameState.npcs?.forEach(n => {
    if (n.gone) return;
    const s = gridToScreen(n.x, n.y);
    ctx.font = '20px serif';
    ctx.textAlign = 'center';
    ctx.fillText(n.emoji, s.x, s.y - 2);
    ctx.font = '9px "Noto Serif KR", serif';
    ctx.fillStyle = '#FFD700';
    ctx.fillText(n.name, s.x, s.y + 12);
  });

  // Draw player
  const playerScreen = gridToScreen(gameState.playerX, gameState.playerY);
  const mainChar = gameState.party[0];
  if (mainChar) {
    drawCharSprite(playerScreen.x, playerScreen.y - 4, mainChar, 0.9);
    ctx.font = '9px "Noto Serif KR", serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.fillText(mainChar.name, playerScreen.x, playerScreen.y + 16);
  }

  // Minimap
  renderMinimap(map, mapW, mapH);
}

function renderMinimap(map, mapW, mapH) {
  const mm = mmCanvas;
  mmCtx.fillStyle = '#0a0608';
  mmCtx.fillRect(0, 0, 100, 100);
  const tw = 100 / mapW, th = 100 / mapH;
  for (let y = 0; y < mapH; y++) {
    for (let x = 0; x < mapW; x++) {
      mmCtx.fillStyle = TILE_COLORS[map[y][x]] || '#333';
      mmCtx.fillRect(x*tw, y*th, tw+0.5, th+0.5);
    }
  }
  // Player dot
  mmCtx.fillStyle = '#FFD700';
  mmCtx.fillRect(gameState.playerX*tw-1, gameState.playerY*th-1, 3, 3);
  // NPC dots
  gameState.npcs?.forEach(n => {
    if (n.gone) return;
    mmCtx.fillStyle = '#ff6666';
    mmCtx.fillRect(n.x*tw, n.y*th, 2, 2);
  });
}

// ═══ BATTLE RENDERING ═══
function renderBattle() {
  const stage = STAGES[gameState.stage];
  // Background
  ctx.fillStyle = stage.bgColor || '#0a0608';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Ground gradient
  const grad = ctx.createLinearGradient(0, canvas.height*0.3, 0, canvas.height);
  grad.addColorStop(0, 'rgba(30,20,10,0.5)');
  grad.addColorStop(1, 'rgba(20,15,8,0.8)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, canvas.height*0.3, canvas.width, canvas.height*0.7);

  // Apply shake
  ctx.save();
  if (gameState.battleShake.t > 0) {
    ctx.translate(gameState.battleShake.x, gameState.battleShake.y);
    gameState.battleShake.t -= 16;
    gameState.battleShake.x = (Math.random()-0.5) * gameState.battleShake.t * 0.3;
    gameState.battleShake.y = (Math.random()-0.5) * gameState.battleShake.t * 0.2;
  }

  const cw = canvas.width, ch = canvas.height;
  const partyAlive = gameState.battleParty.filter(c => c.alive);
  const enemyAlive = gameState.battleEnemies.filter(c => c.alive);

  // Draw party (left side)
  partyAlive.forEach((char, i) => {
    const x = cw * 0.15 + i * (cw * 0.08);
    const y = ch * 0.35 + i * (ch * 0.12);
    char._bx = x; char._by = y;
    const isActive = gameState.turnOrder[gameState.currentTurnIdx] === char;
    if (isActive && gameState.battlePhase === 'select') {
      // Highlight active character
      ctx.fillStyle = 'rgba(255,215,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(x, y + 8, 18, 8, 0, 0, Math.PI*2);
      ctx.fill();
    }
    const flash = gameState.battleAnimTimer > 0 && gameState.battleTarget === char;
    drawCharSprite(x, y, char, 1.1, flash);
  });

  // Draw enemies (right side)
  enemyAlive.forEach((char, i) => {
    const total = enemyAlive.length;
    const x = cw * 0.75 + (i - total/2) * (cw * 0.08);
    const y = ch * 0.35 + (i % 2) * (ch * 0.15);
    char._bx = x; char._by = y;
    const isActive = gameState.turnOrder[gameState.currentTurnIdx] === char;
    if (isActive) {
      ctx.fillStyle = 'rgba(255,50,50,0.15)';
      ctx.beginPath();
      ctx.ellipse(x, y + 8, 18, 8, 0, 0, Math.PI*2);
      ctx.fill();
    }
    const flash = gameState.battleAnimTimer > 0 && gameState.battleTarget === char;
    drawCharSprite(x, y, char, char.isBoss ? 1.4 : 1.1, flash);
    // Boss enrage indicator
    if (char.isBoss && char.enraged) {
      ctx.fillStyle = `rgba(255,50,0,${0.3 + Math.sin(Date.now()*0.005)*0.2})`;
      ctx.beginPath();
      ctx.arc(x, y - 10, 20, 0, Math.PI*2);
      ctx.fill();
    }
    // Enemy name + level
    ctx.font = '9px "Noto Serif KR", serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff8888';
    ctx.fillText(`${char.name} Lv.${char.level}`, x, y + 20);
  });

  ctx.restore();

  // Draw wave indicator if multi-wave
  if (gameState.waves && gameState.waves.length > 1) {
    ctx.font = '10px "Noto Serif KR", serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#c4956a';
    ctx.fillText(`Wave ${gameState.waveIdx + 1} / ${gameState.waves.length}`, cw/2, 20);
  }
}

// ═══ BATTLE SYSTEM ═══
function initBattle() {
  const stage = STAGES[gameState.stage];
  gameState.waves = stage.enemies;
  gameState.waveIdx = 0;
  gameState.battleParty = gameState.party.filter(c => c.alive).map(c => {
    c.defending = false;
    c.stunned = false;
    c.buffs = [];
    return c;
  });
  loadWave(0);
  startBGM(stage.battleMusic || 'battle');
}

function loadWave(idx) {
  gameState.waveIdx = idx;
  gameState.battleEnemies = gameState.waves[idx].map(e => ({
    ...e, alive:true, defending:false, stunned:false, buffs:[], isAlly:false,
    _bx:0, _by:0, enraged:false
  }));
  gameState.battleParty.forEach(c => { c._bx = 0; c._by = 0; });
  calcTurnOrder();
  gameState.battlePhase = 'select';
  gameState.mode = 'battle';
  showBattleUI();
  updateTurnOrderUI();
  advanceTurn();
}

function calcTurnOrder() {
  const all = [...gameState.battleParty.filter(c=>c.alive), ...gameState.battleEnemies.filter(c=>c.alive)];
  // Sort by SPD descending
  all.sort((a,b) => {
    const spdA = a.spd * (a.buffs.find(b=>b.type==='spd')?.value || 1);
    const spdB = b.spd * (b.buffs.find(b=>b.type==='spd')?.value || 1);
    return spdB - spdA;
  });
  gameState.turnOrder = all;
  gameState.currentTurnIdx = -1;
}

function advanceTurn() {
  gameState.currentTurnIdx++;
  // Skip dead/invalid
  while (gameState.currentTurnIdx < gameState.turnOrder.length) {
    const cur = gameState.turnOrder[gameState.currentTurnIdx];
    if (cur && cur.alive) break;
    gameState.currentTurnIdx++;
  }
  if (gameState.currentTurnIdx >= gameState.turnOrder.length) {
    // New round
    endOfRound();
    calcTurnOrder();
    gameState.currentTurnIdx = 0;
    // Skip dead again
    while (gameState.currentTurnIdx < gameState.turnOrder.length && !gameState.turnOrder[gameState.currentTurnIdx]?.alive) {
      gameState.currentTurnIdx++;
    }
  }

  const cur = gameState.turnOrder[gameState.currentTurnIdx];
  if (!cur || !cur.alive) { checkBattleEnd(); return; }

  // Check stunned
  if (cur.stunned) {
    cur.stunned = false;
    setBattleInfo(`${cur.name}은(는) 기절 상태! 턴을 건너뜁니다.`);
    setTimeout(() => advanceTurn(), 800);
    return;
  }

  cur.defending = false;
  updateTurnOrderUI();

  if (cur.isAlly) {
    gameState.battlePhase = 'select';
    showBattleActions(cur);
    setBattleInfo(`${cur.name}의 차례 — 행동을 선택하세요`);
  } else {
    gameState.battlePhase = 'enemyTurn';
    hideBattleActions();
    setBattleInfo(`${cur.name}의 차례...`);
    setTimeout(() => enemyAI(cur), 600);
  }
}

function endOfRound() {
  // Tick buffs
  const all = [...gameState.battleParty, ...gameState.battleEnemies];
  all.forEach(c => {
    c.buffs = c.buffs.filter(b => {
      b.turns--;
      return b.turns > 0;
    });
  });
}

function showBattleActions(char) {
  const actions = document.getElementById('battle-actions');
  const skills = getSkills(char);
  const hasItems = gameState.inventory.some(i => ITEMS[i.id]?.type === 'consumable' && i.qty > 0);

  actions.innerHTML = `
    <button class="btn-atk" onclick="battleAction('attack')">⚔ 공격</button>
    <button class="btn-def" onclick="battleAction('defend')">🛡 방어</button>
    <button class="btn-skill" ${skills.length===0?'disabled':''} onclick="battleAction('skill')">✨ 기술${char.mp>0?'(MP:'+char.mp+')':''}</button>
    <button class="btn-item" ${!hasItems?'disabled':''} onclick="battleAction('item')">🎒 아이템</button>
  `;
}

function hideBattleActions() {
  document.getElementById('battle-actions').innerHTML = '';
}

function showBattleUI() {
  document.getElementById('battle-ui').style.display = 'block';
}
function hideBattleUI() {
  document.getElementById('battle-ui').style.display = 'none';
}

window.battleAction = function(action) {
  const cur = gameState.turnOrder[gameState.currentTurnIdx];
  if (!cur || !cur.isAlly) return;
  playSfx('select');

  if (action === 'attack') {
    gameState.battleAction = 'attack';
    setBattleInfo('공격할 대상을 선택하세요 (적을 클릭)');
    gameState.battlePhase = 'target';
    hideBattleActions();
  } else if (action === 'defend') {
    cur.defending = true;
    playSfx('defend');
    setBattleInfo(`${cur.name}이(가) 방어 태세!`);
    hideBattleActions();
    setTimeout(() => advanceTurn(), 500);
  } else if (action === 'skill') {
    showSkillMenu(cur);
  } else if (action === 'item') {
    showItemMenu(cur);
  }
};

function showSkillMenu(char) {
  const skills = getSkills(char);
  const menu = document.getElementById('skill-menu');
  const list = document.getElementById('skill-list');
  list.innerHTML = skills.map((sk, i) =>
    `<button class="skill-btn" ${char.mp < sk.mpCost ? 'disabled' : ''} onclick="selectSkill(${i})">
      ${sk.name} <span style="color:#88aaff">MP ${sk.mpCost}</span><br>
      <span style="font-size:9px;color:#888">${sk.desc}</span>
    </button>`
  ).join('') + `<button class="skill-btn" onclick="closeSkillMenu()" style="border-color:#888">취소</button>`;
  menu.style.display = 'block';
}

window.selectSkill = function(idx) {
  const cur = gameState.turnOrder[gameState.currentTurnIdx];
  const skills = getSkills(cur);
  gameState.selectedSkill = skills[idx];
  document.getElementById('skill-menu').style.display = 'none';

  if (gameState.selectedSkill.target === 'all') {
    // AoE - auto target all enemies
    gameState.battleAction = 'skill_aoe';
    executeSkillAoE(cur, gameState.selectedSkill);
  } else if (gameState.selectedSkill.target === 'party') {
    // Party buff/heal
    gameState.battleAction = 'skill_party';
    executeSkillParty(cur, gameState.selectedSkill);
  } else {
    // Single target
    gameState.battleAction = 'skill';
    setBattleInfo('기술 대상을 선택하세요');
    gameState.battlePhase = 'target';
    hideBattleActions();
  }
};

window.closeSkillMenu = function() {
  document.getElementById('skill-menu').style.display = 'none';
};

function showItemMenu(char) {
  const menu = document.getElementById('item-menu');
  const list = document.getElementById('item-list');
  const consumables = gameState.inventory.filter(i => ITEMS[i.id]?.type === 'consumable' && i.qty > 0);
  list.innerHTML = consumables.map((item, i) =>
    `<button class="item-btn" onclick="selectItem('${item.id}')">
      ${ITEMS[item.id].name} x${item.qty}<br>
      <span style="font-size:9px;color:#888">${ITEMS[item.id].desc}</span>
    </button>`
  ).join('') + `<button class="item-btn" onclick="closeItemMenu()" style="border-color:#888">취소</button>`;
  menu.style.display = 'block';
}

window.selectItem = function(itemId) {
  const item = ITEMS[itemId];
  document.getElementById('item-menu').style.display = 'none';
  gameState.selectedItem = itemId;

  if (item.revive) {
    // Target dead ally
    setBattleInfo('부활시킬 아군을 선택하세요');
    gameState.battleAction = 'item_revive';
    gameState.battlePhase = 'target_ally';
    hideBattleActions();
  } else if (item.heal || item.healMP || item.cure) {
    setBattleInfo('아이템을 사용할 아군을 선택하세요');
    gameState.battleAction = 'item_use';
    gameState.battlePhase = 'target_ally';
    hideBattleActions();
  }
};

window.closeItemMenu = function() {
  document.getElementById('item-menu').style.display = 'none';
};

// ═══ BATTLE EXECUTION ═══
function calcDamage(attacker, defender, power=1.0) {
  const typeAdv = getTypeAdvantage(attacker.class, defender.class);
  const atkBuff = attacker.buffs.find(b => b.type === 'atk')?.value || 1;
  const defBuff = defender.buffs.find(b => b.type === 'def')?.value || 1;
  const defMul = defender.defending ? 0.5 : 1;
  const baseDmg = attacker.atk * (1 + attacker.level * 0.1) * atkBuff * power;
  const reduction = defender.def * 0.5 * defBuff / defMul;
  const variance = 0.9 + Math.random() * 0.2;
  const crit = Math.random() < 0.1;
  let dmg = Math.max(1, Math.floor((baseDmg - reduction) * typeAdv * variance * (crit ? 1.8 : 1)));
  return { dmg, crit, typeAdv };
}

function applyDamage(target, dmg) {
  target.hp = Math.max(0, target.hp - dmg);
  if (target.hp <= 0) {
    target.alive = false;
    target.hp = 0;
  }
}

function showFloatingDmg(target, dmg, type='phys', crit=false) {
  const container = document.getElementById('float-container');
  const el = document.createElement('div');
  el.className = `float-dmg ${crit ? 'dmg-crit' : 'dmg-'+type}`;
  el.textContent = type === 'heal' ? `+${dmg}` : (type === 'miss' ? 'MISS' : `-${dmg}`);
  const bx = target._bx || canvas.width/2;
  const by = target._by || canvas.height/2;
  el.style.left = (bx + (Math.random()-0.5)*20) + 'px';
  el.style.top = (by - 40) + 'px';
  container.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function shakeScreen(intensity=200) {
  gameState.battleShake = {x:0, y:0, t:intensity};
}

function executeAttack(attacker, target) {
  const {dmg, crit, typeAdv} = calcDamage(attacker, target);
  playSfx(crit ? 'crit' : 'hit');
  shakeScreen(crit ? 300 : 150);
  applyDamage(target, dmg);
  showFloatingDmg(target, dmg, 'phys', crit);
  gameState.battleTarget = target;
  gameState.battleAnimTimer = 300;

  let msg = `${attacker.name}의 공격! ${target.name}에게 ${dmg} 피해!`;
  if (crit) msg += ' [크리티컬!]';
  if (typeAdv > 1) msg += ' [상성 유리!]';
  if (typeAdv < 1) msg += ' [상성 불리]';
  setBattleInfo(msg);

  // Check boss enrage
  if (target.isBoss && target.enrageAt && target.alive && target.hp/target.maxHP <= target.enrageAt && !target.enraged) {
    target.enraged = true;
    target.atk = Math.floor(target.atk * 1.5);
    target.spd += 3;
    setTimeout(() => setBattleInfo(`${target.name}이(가) 분노했다! 공격력 대폭 증가!`), 800);
  }

  setTimeout(() => {
    gameState.battleAnimTimer = 0;
    gameState.battleTarget = null;
    checkBattleEnd() || advanceTurn();
  }, 700);
}

function executeSkillSingle(attacker, target, skill) {
  attacker.mp -= skill.mpCost;
  playSfx('skill');

  if (skill.type === 'charge' || skill.type === 'single') {
    const {dmg, crit} = calcDamage(attacker, target, skill.power);
    shakeScreen(300);
    applyDamage(target, dmg);
    showFloatingDmg(target, dmg, 'magic', crit);
    gameState.battleTarget = target;
    gameState.battleAnimTimer = 400;
    let msg = `${attacker.name}의 ${skill.name}! ${target.name}에게 ${dmg} 피해!`;
    if (skill.stun && target.alive) { target.stunned = true; msg += ' [기절!]'; }
    setBattleInfo(msg);
  } else if (skill.type === 'multi') {
    let totalDmg = 0;
    for (let h = 0; h < skill.hits; h++) {
      setTimeout(() => {
        if (!target.alive) return;
        const {dmg} = calcDamage(attacker, target, skill.power);
        applyDamage(target, dmg);
        showFloatingDmg(target, dmg, 'phys');
        totalDmg += dmg;
        playSfx('hit');
        shakeScreen(100);
      }, h * 200);
    }
    gameState.battleAnimTimer = skill.hits * 200 + 200;
    setBattleInfo(`${attacker.name}의 ${skill.name}! ${skill.hits}연타!`);
  }

  // Boss enrage check
  setTimeout(() => {
    if (target.isBoss && target.enrageAt && target.alive && target.hp/target.maxHP <= target.enrageAt && !target.enraged) {
      target.enraged = true;
      target.atk = Math.floor(target.atk * 1.5);
      target.spd += 3;
      setBattleInfo(`${target.name}이(가) 분노했다!`);
    }
  }, gameState.battleAnimTimer - 100);

  setTimeout(() => {
    gameState.battleAnimTimer = 0;
    gameState.battleTarget = null;
    checkBattleEnd() || advanceTurn();
  }, Math.max(700, gameState.battleAnimTimer));
}

function executeSkillAoE(attacker, skill) {
  attacker.mp -= skill.mpCost;
  playSfx('skill');
  shakeScreen(400);
  hideBattleActions();

  const targets = gameState.battleEnemies.filter(e => e.alive);
  targets.forEach((target, i) => {
    setTimeout(() => {
      const {dmg} = calcDamage(attacker, target, skill.power);
      applyDamage(target, dmg);
      showFloatingDmg(target, dmg, 'magic');
    }, i * 150);
  });
  setBattleInfo(`${attacker.name}의 ${skill.name}! 적 전체에 피해!`);

  setTimeout(() => {
    checkBattleEnd() || advanceTurn();
  }, targets.length * 150 + 500);
}

function executeSkillParty(attacker, skill) {
  attacker.mp -= skill.mpCost;
  playSfx('skill');
  hideBattleActions();

  if (skill.type === 'heal_all') {
    gameState.battleParty.filter(c => c.alive).forEach((c, i) => {
      setTimeout(() => {
        const heal = Math.floor(attacker.atk * skill.power * 0.5 + attacker.level * 3);
        c.hp = Math.min(c.maxHP, c.hp + heal);
        showFloatingDmg(c, heal, 'heal');
        playSfx('heal');
      }, i * 150);
    });
    setBattleInfo(`${attacker.name}의 ${skill.name}! 아군 전체 회복!`);
  } else if (skill.type === 'buff_def') {
    gameState.battleParty.filter(c => c.alive).forEach(c => {
      c.buffs.push({type:'def', turns:2, value:skill.power});
    });
    setBattleInfo(`${attacker.name}의 ${skill.name}! 아군 방어력 증가!`);
    playSfx('defend');
  } else if (skill.type === 'buff_spd') {
    gameState.battleParty.filter(c => c.alive).forEach(c => {
      c.buffs.push({type:'spd', turns:3, value:skill.power});
    });
    setBattleInfo(`${attacker.name}의 ${skill.name}! 아군 속도 증가!`);
  }

  setTimeout(() => advanceTurn(), 800);
}

function useItemOnTarget(itemId, target) {
  const item = ITEMS[itemId];
  const inv = gameState.inventory.find(i => i.id === itemId);
  if (!inv || inv.qty <= 0) return;
  inv.qty--;

  if (item.heal) {
    target.hp = Math.min(target.maxHP, target.hp + item.heal);
    showFloatingDmg(target, item.heal, 'heal');
    playSfx('heal');
    setBattleInfo(`${target.name}에게 ${item.name} 사용! HP ${item.heal} 회복!`);
  } else if (item.healMP) {
    target.mp = Math.min(target.maxMP, target.mp + item.healMP);
    showFloatingDmg(target, item.healMP, 'heal');
    playSfx('heal');
    setBattleInfo(`${target.name}에게 ${item.name} 사용! MP ${item.healMP} 회복!`);
  } else if (item.revive) {
    target.alive = true;
    target.hp = Math.floor(target.maxHP * item.healPct);
    showFloatingDmg(target, target.hp, 'heal');
    playSfx('heal');
    setBattleInfo(`${target.name} 부활! HP ${target.hp} 회복!`);
    // Re-add to turn order
    if (!gameState.turnOrder.includes(target)) {
      gameState.turnOrder.push(target);
    }
  }

  setTimeout(() => advanceTurn(), 600);
}

// ═══ ENEMY AI ═══
function enemyAI(enemy) {
  if (!enemy.alive) { advanceTurn(); return; }

  const aliveAllies = gameState.battleParty.filter(c => c.alive);
  if (aliveAllies.length === 0) { checkBattleEnd(); return; }

  // Boss enrage behavior
  if (enemy.enraged && enemy.skills?.length > 0) {
    const skill = enemy.skills[Math.floor(Math.random() * enemy.skills.length)];
    if (enemy.mp >= (skill.mpCost || 0)) {
      if (skill.type === 'aoe') {
        enemy.mp -= skill.mpCost || 0;
        playSfx('skill');
        shakeScreen(400);
        aliveAllies.forEach((target, i) => {
          setTimeout(() => {
            const {dmg} = calcDamage(enemy, target, skill.power);
            applyDamage(target, dmg);
            showFloatingDmg(target, dmg, 'magic');
          }, i * 150);
        });
        setBattleInfo(`${enemy.name}의 ${skill.name}! 아군 전체에 피해!`);
        setTimeout(() => { checkBattleEnd() || advanceTurn(); }, aliveAllies.length * 150 + 500);
        return;
      } else {
        const target = aliveAllies[Math.floor(Math.random() * aliveAllies.length)];
        executeSkillSingle_enemy(enemy, target, skill);
        return;
      }
    }
  }

  // Use skill sometimes
  if (enemy.skills?.length > 0 && Math.random() < 0.3) {
    const skill = enemy.skills[Math.floor(Math.random() * enemy.skills.length)];
    if (enemy.mp >= (skill.mpCost || 0)) {
      if (skill.type === 'aoe') {
        enemy.mp -= skill.mpCost || 0;
        playSfx('skill');
        shakeScreen(300);
        aliveAllies.forEach((target, i) => {
          setTimeout(() => {
            const {dmg} = calcDamage(enemy, target, skill.power);
            applyDamage(target, dmg);
            showFloatingDmg(target, dmg, 'magic');
          }, i * 150);
        });
        setBattleInfo(`${enemy.name}의 ${skill.name}!`);
        setTimeout(() => { checkBattleEnd() || advanceTurn(); }, aliveAllies.length * 150 + 500);
        return;
      } else {
        const target = aliveAllies[Math.floor(Math.random() * aliveAllies.length)];
        executeSkillSingle_enemy(enemy, target, skill);
        return;
      }
    }
  }

  // Normal attack - prefer low HP target
  const target = aliveAllies.reduce((best, c) => (!best || c.hp < best.hp) ? c : best, null);
  executeAttack(enemy, target);
}

function executeSkillSingle_enemy(attacker, target, skill) {
  attacker.mp -= skill.mpCost || 0;
  playSfx('skill');
  const {dmg, crit} = calcDamage(attacker, target, skill.power);
  shakeScreen(250);
  applyDamage(target, dmg);
  showFloatingDmg(target, dmg, 'magic', crit);
  gameState.battleTarget = target;
  gameState.battleAnimTimer = 400;
  let msg = `${attacker.name}의 ${skill.name}! ${target.name}에게 ${dmg} 피해!`;
  if (skill.stun && target.alive) { target.stunned = true; msg += ' [기절!]'; }
  setBattleInfo(msg);

  setTimeout(() => {
    gameState.battleAnimTimer = 0;
    gameState.battleTarget = null;
    checkBattleEnd() || advanceTurn();
  }, 700);
}

// ═══ BATTLE END CHECK ═══
function checkBattleEnd() {
  const aliveParty = gameState.battleParty.filter(c => c.alive);
  const aliveEnemy = gameState.battleEnemies.filter(c => c.alive);

  if (aliveEnemy.length === 0) {
    // Check next wave
    if (gameState.waves && gameState.waveIdx < gameState.waves.length - 1) {
      setBattleInfo('Wave 클리어! 다음 Wave...');
      setTimeout(() => {
        loadWave(gameState.waveIdx + 1);
        setBattleInfo(`Wave ${gameState.waveIdx + 1} 시작!`);
      }, 1000);
      return true;
    }
    // Victory!
    setTimeout(() => showVictory(), 500);
    return true;
  }
  if (aliveParty.length === 0) {
    setTimeout(() => showDefeat(), 500);
    return true;
  }
  return false;
}

function showVictory() {
  const stage = STAGES[gameState.stage];
  stopBGM();
  playSfx('victory');
  gameState.mode = 'victory';
  hideBattleUI();

  // Calculate rewards
  let totalExp = stage.rewards.exp;
  let totalGold = stage.rewards.gold;
  gameState.battleEnemies.forEach(e => { /* already counted in stage rewards */ });

  // Give EXP and gold
  gameState.gold += totalGold;
  const rewards = document.getElementById('victory-rewards');
  let rewardHTML = `<div class="reward-item"><span>경험치:</span> +${totalExp}</div>`;
  rewardHTML += `<div class="reward-item"><span>골드:</span> +${totalGold}G</div>`;

  // Level ups
  gameState.party.filter(c => c.alive).forEach(c => {
    c.exp += totalExp;
    while (c.exp >= c.expToLevel) {
      c.exp -= c.expToLevel;
      c.level++;
      c.expToLevel = c.level * 30 + 50;
      c.maxHP += 12;
      c.hp = c.maxHP;
      c.maxMP += 5;
      c.mp = c.maxMP;
      c.atk += 3;
      c.def += 2;
      c.spd += 1;
      rewardHTML += `<div class="reward-item" style="color:#FFD700">${c.name} 레벨업! → Lv.${c.level}</div>`;
      playSfx('levelup');
    }
  });

  // Item rewards
  if (stage.rewards.items) {
    stage.rewards.items.forEach(ri => {
      addToInventory(ri.id, ri.qty);
      rewardHTML += `<div class="reward-item"><span>${ITEMS[ri.id].name}</span> x${ri.qty} 획득!</div>`;
    });
  }

  rewards.innerHTML = rewardHTML;
  document.getElementById('victory-screen').classList.add('on');
}

function showDefeat() {
  stopBGM();
  playSfx('defeat');
  gameState.mode = 'defeat';
  hideBattleUI();
  document.getElementById('defeat-screen').classList.add('on');
}

window.onVictoryContinue = function() {
  document.getElementById('victory-screen').classList.remove('on');
  const stage = STAGES[gameState.stage];

  // Restore HP/MP for alive party members
  gameState.party.forEach(c => {
    if (c.alive) {
      c.hp = c.maxHP;
      c.mp = c.maxMP;
    }
  });

  // Post dialogue
  if (stage.postDialogue && stage.postDialogue.length > 0) {
    startDialogue(stage.postDialogue, () => {
      recruitAfterStage();
      completeStage();
    });
  } else {
    recruitAfterStage();
    completeStage();
  }
};

function recruitAfterStage() {
  const stage = STAGES[gameState.stage];
  if (stage.partyAfter && stage.partyAfter.length > 0) {
    stage.partyAfter.forEach(id => {
      if (id === 'pungbaek' && !gameState.party.find(c => c.id === 'pungbaek')) {
        gameState.party.push(makeChar('pungbaek','풍백','궁병',5,true,{hp:10,atk:3,spd:4,weapon:'horn_bow'}));
      }
      if (id === 'usa' && !gameState.party.find(c => c.id === 'usa')) {
        gameState.party.push(makeChar('usa','우사','보병',5,true,{hp:15,def:3,weapon:'bronze_sword',armor:'leather_armor'}));
      }
      if (id === 'unsa' && !gameState.party.find(c => c.id === 'unsa')) {
        gameState.party.push(makeChar('unsa','운사','기마병',5,true,{atk:3,spd:5,weapon:'bronze_spear'}));
      }
    });
    // Limit to 4
    if (gameState.party.length > 4) gameState.party = gameState.party.slice(0, 4);
  }
}

function completeStage() {
  gameState.stageCleared[gameState.stage] = true;

  if (STAGES[gameState.stage].isFinalStage) {
    // Game complete - save for chapter 2
    saveToLocalStorage('chapter1_complete');
    showFinalEnding();
    return;

  // Move to next stage
  gameState.stage++;
  startStage(gameState.stage);
}

// ═══ DIALOGUE SYSTEM ═══
function startDialogue(lines, callback) {
  gameState.dlgQueue = lines;
  gameState.dlgIdx = 0;
  gameState.dlgCallback = callback;
  gameState.dlgTypedLen = 0;
  gameState.dlgTyping = true;
  gameState.mode = 'dialogue';
  showDialogueLine();
  document.getElementById('dlg').style.display = 'block';
}

function showDialogueLine() {
  const line = gameState.dlgQueue[gameState.dlgIdx];
  document.getElementById('dlg-speaker').textContent = line.s || '';
  document.getElementById('dlg-text').textContent = '';
  gameState.dlgTypedLen = 0;
  gameState.dlgTyping = true;
  document.getElementById('dlg-next').style.display = 'none';

  // Portrait
  const portrait = document.getElementById('dlg-portrait');
  if (line.s === '환웅') portrait.textContent = '👑';
  else if (line.s === '환인') portrait.textContent = '👴';
  else if (line.s === '풍백') portrait.textContent = '🌬️';
  else if (line.s === '우사') portrait.textContent = '🌧️';
  else if (line.s === '운사') portrait.textContent = '☁️';
  else if (line.s === '웅녀' || line.s === '웅녀(곰)') portrait.textContent = '🐻';
  else if (line.s === '범족 부족장') portrait.textContent = '🐯';
  else if (line.s === '해설' || line.s === '') portrait.textContent = '📜';
  else portrait.textContent = '🧑';
}

function updateDialogueTyping(dt) {
  if (!gameState.dlgTyping) return;
  const line = gameState.dlgQueue[gameState.dlgIdx];
  gameState.dlgTypeTimer += dt;
  if (gameState.dlgTypeTimer > 30) {
    gameState.dlgTypeTimer = 0;
    gameState.dlgTypedLen++;
    document.getElementById('dlg-text').textContent = line.t.substring(0, gameState.dlgTypedLen);
    if (gameState.dlgTypedLen >= line.t.length) {
      gameState.dlgTyping = false;
      document.getElementById('dlg-next').style.display = 'block';
    }
  }
}

function advanceDialogue() {
  if (gameState.dlgTyping) {
    // Skip typing
    const line = gameState.dlgQueue[gameState.dlgIdx];
    document.getElementById('dlg-text').textContent = line.t;
    gameState.dlgTyping = false;
    document.getElementById('dlg-next').style.display = 'block';
    return;
  }

  gameState.dlgIdx++;
  if (gameState.dlgIdx < gameState.dlgQueue.length) {
    showDialogueLine();
  } else {
    document.getElementById('dlg').style.display = 'none';
    if (gameState.dlgCallback) {
      const cb = gameState.dlgCallback;
      gameState.dlgCallback = null;
      cb();
    }
  }
}

document.getElementById('dlg').addEventListener('click', () => {
  if (gameState.mode === 'dialogue') advanceDialogue();
});

// ═══ MAP MOVEMENT ═══
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; });

let moveTimer = 0;
function updateMapMovement(dt) {
  if (gameState.mode !== 'map') return;
  moveTimer += dt;
  if (moveTimer < 150) return;

  let dx = 0, dy = 0;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = 1;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1;

  if (dx !== 0 || dy !== 0) {
    moveTimer = 0;
    tryMove(dx, dy);
  }
}

function tryMove(dx, dy) {
  const nx = gameState.playerX + dx;
  const ny = gameState.playerY + dy;
  const map = gameState.mapData;
  if (!map) return;
  if (ny < 0 || ny >= map.length || nx < 0 || nx >= map[0].length) return;
  const tile = map[ny][nx];
  if (!TILE_PASSABLE[tile]) return;

  gameState.playerX = nx;
  gameState.playerY = ny;
  if (dy > 0) gameState.playerDir = 0;
  else if (dx < 0) gameState.playerDir = 1;
  else if (dy < 0) gameState.playerDir = 2;
  else if (dx > 0) gameState.playerDir = 3;

  // Check interactions
  checkTileInteraction(nx, ny);
}

function checkTileInteraction(x, y) {
  // Chest
  const chest = gameState.chests?.find(c => c.x === x && c.y === y && !c.opened);
  if (chest) {
    chest.opened = true;
    const item = ITEMS[chest.item];
    addToInventory(chest.item, chest.qty);
    playSfx('select');
    startDialogue([{s:'', t:`보물 상자를 열었다! ${item.name} x${chest.qty} 획득!`}], () => { gameState.mode = 'map'; });
    return;
  }

  // Heal spot
  const heal = gameState.healSpots?.find(h => h.x === x && h.y === y);
  if (heal) {
    gameState.party.forEach(c => { c.hp = c.maxHP; c.mp = c.maxMP; c.alive = true; });
    playSfx('heal');
    // Don't interrupt - just visual feedback
  }

  // NPC proximity
  const npc = gameState.npcs?.find(n => !n.gone && Math.abs(n.x - x) <= 1 && Math.abs(n.y - y) <= 1 && !(n.x === x && n.y === y));
  // Auto-interact handled by click/enter
}

function interactNearby() {
  const {playerX: px, playerY: py} = gameState;
  const npc = gameState.npcs?.find(n => !n.gone && Math.abs(n.x - px) + Math.abs(n.y - py) <= 2);
  if (npc) {
    interactWithNPC(npc);
  }
}

function interactWithNPC(npc) {
  playSfx('menu');
  startDialogue(npc.lines, () => {
    if (npc.triggerBattle) {
      npc.gone = true;
      initBattle();
    } else if (npc.triggerEndurance) {
      npc.gone = true;
      startEndurance();
    } else {
      gameState.mode = 'map';
    }
  });
}

window.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    if (gameState.mode === 'map') interactNearby();
    else if (gameState.mode === 'dialogue') advanceDialogue();
  }
  if (e.key === 'Escape') {
    if (gameState.mode === 'map') toggleMenu();
    else if (gameState.mode === 'menu') toggleMenu();
  }
});

// ═══ TOUCH / CLICK ═══
let touchStartX = 0, touchStartY = 0;

canvas.addEventListener('click', e => {
  initAudio();
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left, cy = e.clientY - rect.top;

  if (gameState.mode === 'map') {
    const grid = screenToGrid(cx, cy);
    const npc = gameState.npcs?.find(n => !n.gone && n.x === grid.x && n.y === grid.y);
    if (npc) {
      // Move adjacent then interact
      const dx = Math.sign(npc.x - gameState.playerX);
      const dy = Math.sign(npc.y - gameState.playerY);
      if (Math.abs(npc.x - gameState.playerX) + Math.abs(npc.y - gameState.playerY) <= 2) {
        interactWithNPC(npc);
      } else {
        // Simple pathfind: just move toward NPC
        tryMove(dx, dy);
      }
    } else if (grid.x >= 0 && grid.y >= 0 && grid.x < gameState.mapW && grid.y < gameState.mapH) {
      const dx = Math.sign(grid.x - gameState.playerX);
      const dy = Math.sign(grid.y - gameState.playerY);
      tryMove(dx, dy);
    }
  }

  if (gameState.mode === 'battle' && gameState.battlePhase === 'target') {
    // Click on enemy
    const enemy = gameState.battleEnemies.find(e => e.alive && e._bx && Math.abs(cx - e._bx) < 25 && Math.abs(cy - e._by) < 30);
    if (enemy) {
      const cur = gameState.turnOrder[gameState.currentTurnIdx];
      if (gameState.battleAction === 'attack') {
        executeAttack(cur, enemy);
      } else if (gameState.battleAction === 'skill') {
        executeSkillSingle(cur, enemy, gameState.selectedSkill);
      }
      gameState.battlePhase = 'animate';
    }
  }

  if (gameState.mode === 'battle' && gameState.battlePhase === 'target_ally') {
    // Click on ally
    const ally = gameState.battleParty.find(c => {
      if (gameState.battleAction === 'item_revive') return !c.alive;
      return c.alive;
    });
    // Find clicked ally
    const clickedAlly = gameState.battleParty.find(c => c._bx && Math.abs(cx - c._bx) < 25 && Math.abs(cy - c._by) < 30);
    if (clickedAlly) {
      if (gameState.battleAction === 'item_revive' && !clickedAlly.alive) {
        useItemOnTarget(gameState.selectedItem, clickedAlly);
        gameState.battlePhase = 'animate';
      } else if (gameState.battleAction === 'item_use' && clickedAlly.alive) {
        useItemOnTarget(gameState.selectedItem, clickedAlly);
        gameState.battlePhase = 'animate';
      }
    }
  }
});

// Touch swipe for mobile movement
canvas.addEventListener('touchstart', e => {
  initAudio();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return; // tap, not swipe
  if (gameState.mode === 'map') {
    if (Math.abs(dx) > Math.abs(dy)) {
      tryMove(dx > 0 ? 1 : -1, 0);
    } else {
      tryMove(0, dy > 0 ? 1 : -1);
    }
  }
});

// ═══ INVENTORY ═══
function addToInventory(itemId, qty) {
  const existing = gameState.inventory.find(i => i.id === itemId);
  if (existing) existing.qty += qty;
  else gameState.inventory.push({id: itemId, qty});
}

// ═══ STAGE INITIALIZATION ═══
function startStage(stageIdx) {
  gameState.stage = stageIdx;
  const stage = STAGES[stageIdx];
  if (!stage) return;

  // Init party for first stage
  if (stage.initParty && (stageIdx === 0 || gameState.party.length === 0)) {
    gameState.party = stage.initParty();
    // Starting inventory
    gameState.inventory = [
      {id:'hp_potion', qty:3},
      {id:'mp_potion', qty:2}
    ];
    gameState.gold = 100;
  }

  // Setup map
  gameState.mapData = stage.map.map(r => [...r]);
  gameState.mapH = stage.map.length;
  gameState.mapW = stage.map[0].length;
  gameState.playerX = stage.playerStart.x;
  gameState.playerY = stage.playerStart.y;
  gameState.npcs = stage.npcs.map(n => ({...n, gone:false, lines:[...n.lines]}));
  gameState.chests = stage.chests.map(c => ({...c, opened:false}));
  gameState.healSpots = [...stage.healSpots];

  // Center camera
  gameState.cameraX = isoX(gameState.playerX, gameState.playerY);
  gameState.cameraY = isoY(gameState.playerX, gameState.playerY);

  // Show HUD
  document.getElementById('hud').style.display = 'block';
  document.getElementById('minimap').style.display = 'block';
  document.getElementById('hud-stage').textContent = `${stage.id} ${stage.name}`;

  // Pre-dialogue
  if (stage.preDialogue && stage.preDialogue.length > 0) {
    startDialogue(stage.preDialogue, () => {
      gameState.mode = 'map';
      startBGM(stage.music || 'map');
    });
  } else {
    gameState.mode = 'map';
    startBGM(stage.music || 'map');
  }

  updateHUD();
}

// ═══ ENDURANCE MINIGAME (Stage 1-4) ═══
function startEndurance() {
  gameState.mode = 'endurance';
  gameState.enduranceDay = 0;
  gameState.enduranceHP = 100;
  const el = document.getElementById('endurance-game');
  el.classList.add('on');
  nextEnduranceDay();
}

function nextEnduranceDay() {
  gameState.enduranceDay++;
  if (gameState.enduranceDay > 10) {
    // Success!
    document.getElementById('endurance-game').classList.remove('on');
    startDialogue([
      {s:'', t:'100일의 시련이 끝났다!'},
      {s:'', t:'곰은 아름다운 여인으로 변했다. 이것이 웅녀이다.'},
      {s:'', t:'호랑이는 중도에 포기하고 뛰쳐나갔다.'},
    ], () => {
      // Now trigger the battle with cave monsters
      const npc = gameState.npcs?.find(n => n.triggerBattle && !n.gone);
      if (npc) {
        gameState.mode = 'map';
      } else {
        gameState.mode = 'map';
      }
    });
    return;
  }

  const dayDisplay = gameState.enduranceDay * 10;
  document.getElementById('endurance-day').textContent = `${dayDisplay}일차 / 100일`;
  document.getElementById('endurance-fill').style.width = (gameState.enduranceDay * 10) + '%';

  // Random event
  const events = [
    {prompt:'배가 고프다... 쑥을 먹어 인내하라!', loss:10},
    {prompt:'동굴이 춥다... 마늘을 먹어 버텨라!', loss:12},
    {prompt:'밖에서 새소리가 들린다... 참아라!', loss:8},
    {prompt:'호랑이가 유혹한다: "나가자!"', loss:15},
    {prompt:'어둠이 무섭다... 신념을 지켜라!', loss:10},
  ];
  const evt = events[Math.floor(Math.random() * events.length)];
  document.getElementById('endurance-prompt').textContent = evt.prompt;

  const btn = document.getElementById('endurance-btn');
  btn.style.display = 'none';
  setTimeout(() => {
    btn.style.display = 'block';
    btn.onclick = () => {
      gameState.enduranceHP -= evt.loss * (0.5 + Math.random() * 0.5);
      if (gameState.enduranceHP < 0) gameState.enduranceHP = 0;
      playSfx('defend');
      document.getElementById('endurance-prompt').textContent = '인내 성공! 계속 버텨라...';
      btn.style.display = 'none';
      setTimeout(() => nextEnduranceDay(), 800);
    };
  }, 500 + Math.random() * 1000);
}

      <div class="hud-bar"><div class="hud-bar-mp" style="width:${mpPct}%"></div></div>
    </div>`;
  }).join('');
}

function updateTurnOrderUI() {
  const container = document.getElementById('battle-turn-order');
  container.innerHTML = gameState.turnOrder.filter(c => c.alive).map((c, i) => {
    const isActive = i === gameState.currentTurnIdx;
    const team = c.isAlly ? 'ally' : 'enemy';
    return `<span class="turn-marker ${team} ${isActive?'active':''}">${c.portrait||'?'} ${c.name}</span>`;

// ═══ MENU / STATUS / SAVE ═══
window.toggleMenu = function() {
  const menu = document.getElementById('menu-overlay');
  if (menu.classList.contains('on')) {
    menu.classList.remove('on');
    // Return to previous mode
    if (gameState.mode === 'menu') {
      gameState.mode = gameState._prevMode || 'map';
    }
  } else {
    gameState._prevMode = gameState.mode;
    gameState.mode = 'menu';
    menu.classList.add('on');
    playSfx('menu');
  }
};

window.openStatusScreen = function() {
  document.getElementById('menu-overlay').classList.remove('on');
  document.getElementById('status-screen').style.display = 'block';
  gameState.mode = 'status';

  const content = document.getElementById('status-content');
  content.innerHTML = gameState.party.map(c => {
    const skills = getSkills(c);
    return `<div class="status-card">
      <h3>${c.portrait} ${c.name} (${c.class}) Lv.${c.level}</h3>
      <div class="stat-row"><span>HP</span><span>${c.hp}/${c.maxHP}</span></div>
      <div class="stat-row"><span>MP</span><span>${c.mp}/${c.maxMP}</span></div>
      <div class="stat-row"><span>공격력(ATK)</span><span>${c.atk}</span></div>
      <div class="stat-row"><span>방어력(DEF)</span><span>${c.def}</span></div>
      <div class="stat-row"><span>속도(SPD)</span><span>${c.spd}</span></div>
      <div class="stat-row"><span>경험치(EXP)</span><span>${c.exp}/${c.expToLevel}</span></div>
      <div class="equip-row">무기: ${c.weapon ? ITEMS[c.weapon]?.name : '없음'}</div>
      <div class="equip-row">갑옷: ${c.armor ? ITEMS[c.armor]?.name : '없음'}</div>
      <div class="equip-row">장신구: ${c.accessory ? ITEMS[c.accessory]?.name : '없음'}</div>
      <div class="equip-row">기술: ${skills.map(s => s.name).join(', ') || '없음'}</div>
    </div>`;
  }).join('') + `
    <div class="status-card">
      <h3>💰 소지금: ${gameState.gold}G</h3>
      <h4 style="color:#c4956a;margin-top:4px">인벤토리</h4>
      ${gameState.inventory.filter(i=>i.qty>0).map(i => `<div class="stat-row"><span>${ITEMS[i.id]?.name}</span><span>x${i.qty}</span></div>`).join('') || '<div style="color:#666;font-size:10px">비어있음</div>'}
    </div>`;
};

window.closeStatusScreen = function() {
  document.getElementById('status-screen').style.display = 'none';
  gameState.mode = gameState._prevMode || 'map';
};

window.openSaveScreen = function(mode) {
  gameState.saveMode = mode;
  document.getElementById('menu-overlay').classList.remove('on');
  document.getElementById('save-screen').style.display = 'block';
  document.getElementById('save-title').textContent = mode === 'save' ? '저장' : '불러오기';
  gameState.mode = 'save';

  const container = document.getElementById('save-slots');
  container.innerHTML = '';
  for (let i = 1; i <= 3; i++) {
    const data = localStorage.getItem(`krpg_save_${i}`);
    const slot = document.createElement('div');
    slot.className = 'save-slot';
    if (data) {
      const parsed = JSON.parse(data);
      slot.innerHTML = `<h4>슬롯 ${i}</h4><p>스테이지 ${parsed.stageId || '?'} · ${parsed.partyNames || '?'} · ${parsed.date || ''}</p>`;
    } else {
      slot.innerHTML = `<h4>슬롯 ${i}</h4><p>비어있음</p>`;
    }
    slot.onclick = () => {
      if (mode === 'save') {
        saveGame(i);
        closeSaveScreen();
        startDialogue([{s:'', t:'저장 완료!'}], () => { gameState.mode = gameState._prevMode || 'map'; });
      } else {
        if (data) {
          loadGame(i);
          closeSaveScreen();
        }
      }
    };
    container.appendChild(slot);
  }
};

window.closeSaveScreen = function() {
  document.getElementById('save-screen').style.display = 'none';
  if (gameState.mode === 'save') {
    gameState.mode = gameState._prevMode || 'map';
  }
};

function saveGame(slot) {
  const data = {
    stage: gameState.stage,
    stageId: STAGES[gameState.stage]?.id,
    party: gameState.party.map(c => ({
      id:c.id, name:c.name, class:c.class, level:c.level, exp:c.exp, expToLevel:c.expToLevel,
      maxHP:c.maxHP, hp:c.hp, maxMP:c.maxMP, mp:c.mp,
      atk:c.atk, def:c.def, spd:c.spd,
      weapon:c.weapon, armor:c.armor, accessory:c.accessory, isAlly:true, alive:c.alive
    })),
    inventory: gameState.inventory,
    gold: gameState.gold,
    stageCleared: gameState.stageCleared,
    partyNames: gameState.party.map(c => c.name).join(', '),
    date: new Date().toLocaleString('ko-KR')
  };
  localStorage.setItem(`krpg_save_${slot}`, JSON.stringify(data));
}

function saveToLocalStorage(key) {
  const data = {
    party: gameState.party.map(c => ({
      id:c.id, name:c.name, class:c.class, level:c.level, exp:c.exp,
      maxHP:c.maxHP, hp:c.hp, maxMP:c.maxMP, mp:c.mp,
      atk:c.atk, def:c.def, spd:c.spd,
      weapon:c.weapon, armor:c.armor, accessory:c.accessory
    })),
    inventory: gameState.inventory,
    gold: gameState.gold
  };
  localStorage.setItem(`krpg_${key}`, JSON.stringify(data));
}

function loadGame(slot) {
  const raw = localStorage.getItem(`krpg_save_${slot}`);
  if (!raw) return;
  const data = JSON.parse(raw);

  gameState.party = data.party.map(c => {
    const char = makeChar(c.id, c.name, c.class, c.level, true, {weapon:c.weapon, armor:c.armor, accessory:c.accessory});
    char.exp = c.exp;
    char.expToLevel = c.expToLevel;
    char.hp = c.hp;
    char.mp = c.mp;
    char.alive = c.alive !== false;
    // Restore raw stats
    char.atk = c.atk;
    char.def = c.def;
    char.spd = c.spd;
    char.maxHP = c.maxHP;
    char.maxMP = c.maxMP;
    return char;
  });
  gameState.inventory = data.inventory || [];
  gameState.gold = data.gold || 0;
  gameState.stageCleared = data.stageCleared || [false,false,false,false,false];

  document.getElementById('title-screen').style.display = 'none';
  startStage(data.stage);
}

// ═══ MAIN GAME START ═══
window.startNewGame = function() {
  initAudio();
  document.getElementById('title-screen').style.display = 'none';
  startStage(0);
};

// ═══ GAME LOOP ═══
let lastTime = 0;
function gameLoop(time) {
  const dt = time - lastTime;
  lastTime = time;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameState.mode === 'map') {
    updateMapMovement(dt);
    renderMap();
    updateHUD();
  } else if (gameState.mode === 'battle' || gameState.mode === 'battle_anim') {
    renderBattle();
    updateHUD();
  } else if (gameState.mode === 'dialogue') {
    // Render the scene behind dialogue
    if (gameState.battleParty && gameState.battleParty.length > 0 && document.getElementById('battle-ui').style.display === 'block') {
      renderBattle();
    } else if (gameState.mapData) {
      renderMap();
    } else {
      // Title scene background
      ctx.fillStyle = '#0a0608';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      // Stars
      for (let i = 0; i < 50; i++) {
        const x = (Math.sin(i*127.1+time*0.0001)*0.5+0.5)*canvas.width;
        const y = (Math.cos(i*311.7+time*0.00008)*0.5+0.5)*canvas.height*0.6;
        const brightness = 0.3 + Math.sin(time*0.002 + i)*0.3;
        ctx.fillStyle = `rgba(255,220,180,${brightness})`;
        ctx.fillRect(x, y, 1.5, 1.5);
      }
    }
    updateDialogueTyping(dt);
    updateHUD();
  } else if (gameState.mode === 'title') {
    // Animated background for title
    ctx.fillStyle = '#0a0608';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Animated stars
    for (let i = 0; i < 80; i++) {
      const x = (Math.sin(i*127.1+time*0.00005)*0.5+0.5)*canvas.width;
      const y = (Math.cos(i*311.7+time*0.00004)*0.5+0.5)*canvas.height;
      const brightness = 0.2 + Math.sin(time*0.001 + i*0.5)*0.3;
      ctx.fillStyle = `rgba(255,220,180,${brightness})`;
      ctx.fillRect(x, y, 2, 2);
    }
    // Mountain silhouette
    ctx.fillStyle = '#1a0e08';
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    for (let x = 0; x <= canvas.width; x += 20) {
      const h = canvas.height * 0.7 + Math.sin(x*0.008)*40 + Math.sin(x*0.003)*80;
      ctx.lineTo(x, h);
    }
    ctx.lineTo(canvas.width, canvas.height);
    ctx.closePath();
    ctx.fill();
  } else if (gameState.mode === 'menu' || gameState.mode === 'status' || gameState.mode === 'save') {
    // Render map/battle behind
    if (gameState.battleParty?.length > 0 && gameState._prevMode === 'battle') {
      renderBattle();
    } else if (gameState.mapData) {
      renderMap();
    }
  } else if (gameState.mode === 'victory' || gameState.mode === 'defeat') {
    renderBattle();
  } else if (gameState.mode === 'endurance') {
    ctx.fillStyle = '#0a0818';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Cave atmosphere
    for (let i = 0; i < 30; i++) {
      const x = (Math.sin(i*73+time*0.0003)*0.5+0.5)*canvas.width;
      const y = (Math.cos(i*137+time*0.0002)*0.5+0.5)*canvas.height;
      ctx.fillStyle = `rgba(100,50,150,${0.05 + Math.sin(time*0.002+i)*0.03})`;
      ctx.beginPath();
      ctx.arc(x, y, 20+Math.sin(i)*10, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Battle anim timer
  if (gameState.battleAnimTimer > 0) {
    gameState.battleAnimTimer -= dt;
  }

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
