// 🔊 AudioManager — Web Audio API 사운드 시스템
// ============================================================
class AudioManager {
  constructor() {
    this.ctx = null;
    this.muted = false;
    this.bgmGain = null;
    this.sfxGain = null;
    this.currentBGM = null;
    this.initialized = false;
  }

  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.bgmGain = this.ctx.createGain();
      this.bgmGain.gain.value = 0.12;
      this.bgmGain.connect(this.ctx.destination);
      this.sfxGain = this.ctx.createGain();
      this.sfxGain.gain.value = 0.25;
      this.sfxGain.connect(this.ctx.destination);
      this.initialized = true;
    } catch(e) { console.warn('Audio not available'); }
  }

  toggle() {
    this.muted = !this.muted;
    if (this.bgmGain) this.bgmGain.gain.value = this.muted ? 0 : 0.12;
    if (this.sfxGain) this.sfxGain.gain.value = this.muted ? 0 : 0.25;
    return this.muted;
  }

  // 한국 전통 펜타토닉 스케일 (궁상각치우)
  pentatonic(base, idx) {
    const intervals = [0, 2, 4, 7, 9, 12, 14, 16, 19, 21];
    return base * Math.pow(2, intervals[idx % intervals.length] / 12);
  }

  playBGM(type) {
    if (!this.ctx) return;
    this.stopBGM();
    const play = () => {
      if (this.muted || !this.ctx) return;
      const now = this.ctx.currentTime;
      const baseFreq = type === 'battle' ? 220 : type === 'title' ? 261.63 : 329.63;
      const tempo = type === 'battle' ? 0.25 : 0.5;
      const melodyLen = type === 'battle' ? 16 : 8;
      const melody = [];
      
      for (let i = 0; i < melodyLen; i++) {
        const noteIdx = type === 'battle' 
          ? [0,2,4,3,1,4,2,0,3,1,4,2,0,3,4,1][i]
          : [0,2,4,3,2,4,3,0][i];
        melody.push(this.pentatonic(baseFreq, noteIdx));
      }

      melody.forEach((freq, i) => {
        const osc = this.ctx.createOscillator();
        const env = this.ctx.createGain();
        osc.type = type === 'battle' ? 'sawtooth' : 'sine';
        osc.frequency.value = freq;
        env.gain.setValueAtTime(0, now + i * tempo);
        env.gain.linearRampToValueAtTime(0.3, now + i * tempo + 0.05);
        env.gain.linearRampToValueAtTime(0, now + i * tempo + tempo * 0.9);
        osc.connect(env);
        env.connect(this.bgmGain);
        osc.start(now + i * tempo);
        osc.stop(now + i * tempo + tempo);
      });

      this.currentBGM = setTimeout(() => play(), melodyLen * tempo * 1000);
    };
    play();
  }

  stopBGM() {
    if (this.currentBGM) { clearTimeout(this.currentBGM); this.currentBGM = null; }
  }

  playSFX(type) {
    if (!this.ctx || this.muted) return;
    const now = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const env = this.ctx.createGain();
    
    switch(type) {
      case 'hit':
        osc.type = 'square'; osc.frequency.value = 150;
        osc.frequency.linearRampToValueAtTime(80, now + 0.1);
        env.gain.setValueAtTime(0.4, now);
        env.gain.linearRampToValueAtTime(0, now + 0.15);
        break;
      case 'skill':
        osc.type = 'sine'; osc.frequency.value = 400;
        osc.frequency.linearRampToValueAtTime(800, now + 0.2);
        env.gain.setValueAtTime(0.3, now);
        env.gain.linearRampToValueAtTime(0, now + 0.3);
        break;
      case 'heal':
        osc.type = 'sine'; osc.frequency.value = 523;
        osc.frequency.linearRampToValueAtTime(784, now + 0.15);
        osc.frequency.linearRampToValueAtTime(1047, now + 0.3);
        env.gain.setValueAtTime(0.2, now);
        env.gain.linearRampToValueAtTime(0, now + 0.4);
        break;
      case 'death':
        osc.type = 'sawtooth'; osc.frequency.value = 200;
        osc.frequency.linearRampToValueAtTime(50, now + 0.3);
        env.gain.setValueAtTime(0.3, now);
        env.gain.linearRampToValueAtTime(0, now + 0.4);
        break;
      case 'click':
        osc.type = 'sine'; osc.frequency.value = 600;
        env.gain.setValueAtTime(0.15, now);
        env.gain.linearRampToValueAtTime(0, now + 0.05);
        break;
      case 'levelup':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(659, now + 0.1);
        osc.frequency.setValueAtTime(784, now + 0.2);
        osc.frequency.setValueAtTime(1047, now + 0.3);
        env.gain.setValueAtTime(0.3, now);
        env.gain.linearRampToValueAtTime(0, now + 0.5);
        break;
      case 'victory':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(659, now + 0.15);
        osc.frequency.setValueAtTime(784, now + 0.3);
        osc.frequency.setValueAtTime(1047, now + 0.45);
        env.gain.setValueAtTime(0.3, now);
        env.gain.linearRampToValueAtTime(0, now + 0.7);
        break;
      case 'crit':
        osc.type = 'square'; osc.frequency.value = 300;
        osc.frequency.linearRampToValueAtTime(600, now + 0.05);
        osc.frequency.linearRampToValueAtTime(100, now + 0.2);
        env.gain.setValueAtTime(0.5, now);
        env.gain.linearRampToValueAtTime(0, now + 0.25);
        break;
      default:
        osc.type = 'sine'; osc.frequency.value = 440;
        env.gain.setValueAtTime(0.2, now);
        env.gain.linearRampToValueAtTime(0, now + 0.1);
    }
    osc.connect(env);
    env.connect(this.sfxGain);
    osc.start(now);
    osc.stop(now + 0.7);
  }
}

const audioMgr = new AudioManager();

// ============================================================
// 💾 SaveManager — localStorage 세이브/로드
// ============================================================
class SaveManager {
  static save(data) {
    try {
      data.date = new Date().toLocaleDateString('ko-KR');
      localStorage.setItem('history-rpg-save', JSON.stringify(data));
    } catch(e) {}
  }
  static load() {
    try {
      const d = localStorage.getItem('history-rpg-save');
      return d ? JSON.parse(d) : null;
    } catch(e) { return null; }
  }
  static clear() {
    try { localStorage.removeItem('history-rpg-save'); } catch(e) {}
  }
}

// 🎨 BootScene

class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  create() {
    for (const [key, info] of Object.entries(TILE_INFO)) {
      const g = this.add.graphics();
      g.fillStyle(Phaser.Display.Color.HexStringToColor(info.colors[0]).color);
      g.fillRect(0, 0, CELL, CELL);
      g.fillStyle(Phaser.Display.Color.HexStringToColor(info.colors[1]).color, 0.5);
      for (let i = 0; i < 6; i++) {
        g.fillRect(Phaser.Math.Between(2,CELL-8), Phaser.Math.Between(2,CELL-8),
          Phaser.Math.Between(3,8), Phaser.Math.Between(3,8));
      }
      g.generateTexture('tile_'+key, CELL, CELL);
      g.destroy();
    }
    this.scene.start('Title');
  }
}

// 📖 StoryScene
// ══════════════════════════════════════════════════
class StoryScene extends Phaser.Scene {
  constructor() { super('Story'); }

  create() {
    audioMgr.stopBGM();
    this.lineIndex = 0;
    const ep = EPISODES[currentEpisode];
    this.lines = ep.storyLines;
    const w = this.cameras.main.width;
    const h = this.cameras.main.height;
    this.cameras.main.setBackgroundColor('#0e0e14');

    this.add.text(w/2, 30, ep.title, { fontSize:'11px', fill:'#8a7a6a', letterSpacing:3 }).setOrigin(0.5);
    this.add.text(w/2, 52, ep.subtitle, {
      fontSize:'22px', fill:'#c4956a', fontStyle:'bold', fontFamily:'Noto Serif KR, serif'
    }).setOrigin(0.5);
    this.add.text(w/2, 72, ep.era, { fontSize:'10px', fill:'#5a5a5a' }).setOrigin(0.5);

    this.speakerText = this.add.text(w/2, h*0.3, '', { fontSize:'12px', fill:'#DAA520', fontStyle:'bold' }).setOrigin(0.5);
    const boxY = h*0.35;
    this.add.rectangle(w/2, boxY+50, w*0.88, 120, 0x0a0a14, 0.8).setStrokeStyle(1, 0xc4956a, 0.3);
    this.storyText = this.add.text(w/2, boxY+50, '', {
      fontSize:'14px', fill:'#e8dcc8', wordWrap:{width:w*0.8}, lineSpacing:10, align:'center',
      fontFamily:'Noto Serif KR, serif'
    }).setOrigin(0.5);

    this.nextBtn = this.add.text(w/2, h*0.72, '다음 ▶', {
      fontSize:'16px', fill:'#e8dcc8', fontStyle:'bold',
      backgroundColor:'#6B1A0A', padding:{x:24,y:12}
    }).setOrigin(0.5).setInteractive({useHandCursor:true});
    this.nextBtn.on('pointerdown', () => { audioMgr.playSFX('click'); this.advance(); });

    this.dotsContainer = this.add.container(w/2, h*0.82);
    this.showLine();
    this.cameras.main.fadeIn(500);
  }

  showLine() {
    const line = this.lines[this.lineIndex];
    const isHistory = line.text.startsWith('▶');
    this.speakerText.setText(line.speaker === '해설' ? '' : '— ' + line.speaker + ' —');
    this.storyText.setText(line.text);
    this.storyText.setColor(isHistory ? '#c4956a' : '#e8dcc8');
    this.nextBtn.setText(this.lineIndex >= this.lines.length - 1 ? '⚔️ 전투 개시!' : '다음 ▶');
    this.dotsContainer.removeAll(true);
    for (let i = 0; i < this.lines.length; i++) {
      const dot = this.add.circle((i - this.lines.length/2)*12, 0, 3, i <= this.lineIndex ? 0xc4956a : 0x333333);
      this.dotsContainer.add(dot);
    }
  }

  advance() {
    if (this.lineIndex < this.lines.length - 1) {
      this.lineIndex++;
      this.showLine();
    } else {
      this.cameras.main.fadeOut(500);
      this.time.delayedCall(500, () => this.scene.start('Battle'));
    }
  }
}

// ⚔️ BattleScene — 전술 전투 (메인)
// ══════════════════════════════════════════════════
class BattleScene extends Phaser.Scene {
  constructor() { super('Battle'); }

  create() {
    audioMgr.playBGM('battle');
    const ep = EPISODES[currentEpisode];
    this.mapData = ep.mapData;
    this.cameras.main.setBackgroundColor('#2a3a2a');

    // 날씨 결정
    this.weather = WEATHERS[Phaser.Math.Between(0, WEATHERS.length - 1)];

    // 상태 초기화
    this.turnCount = 1;
    this.phase = 'playerSelect';
    this.selectedUnit = null;
    this.moveRange = [];
    this.attackTargets = [];
    this.attackMode = null;
    this.attackSkillIdx = null;
    this.itemCount = 3;

    // 타일맵
    this.drawTilemap();

    // 유닛 생성
    this.units = [];
    this.createUnits(ep);

    // 카메라
    this.cameras.main.setBounds(0, 0, MAP_W*CELL, MAP_H*CELL);
    const startUnit = this.units.find(u => u.team === 'ally');
    if (startUnit) this.cameras.main.centerOn(startUnit.x*CELL, startUnit.y*CELL);

    // 드래그 스크롤
    this.input.on('pointermove', (ptr) => {
      if (ptr.isDown && this.dragPrev) {
        const dx = this.dragPrev.x - ptr.x, dy = this.dragPrev.y - ptr.y;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
          this.isDragging = true;
          this.cameras.main.scrollX += dx;
          this.cameras.main.scrollY += dy;
        }
      }
      this.dragPrev = { x: ptr.x, y: ptr.y };
    });
    this.input.on('pointerdown', (ptr) => { this.dragPrev = {x:ptr.x,y:ptr.y}; this.isDragging = false; });
    this.input.on('pointerup', (ptr) => {
      if (!this.isDragging) this.handleTap(ptr);
      this.isDragging = false; this.dragPrev = null;
    });

    // 오버레이
    this.moveOverlays = this.add.group();
    this.atkOverlays = this.add.group();
    this.selectionBox = this.add.rectangle(0,0,CELL,CELL).setStrokeStyle(3,0xFFD700).setFillStyle(0xFFD700,0.1).setVisible(false).setDepth(15);

    // HUD
    this.createHUD();

    // 가이드
    this.guideText = this.add.text(
      this.cameras.main.width/2, 36, '아군을 터치하여 선택',
      {fontSize:'11px', fill:'#c4956a', align:'center'}
    ).setOrigin(0.5).setScrollFactor(0).setDepth(100);

    // 턴/날씨 표시
    this.turnText = this.add.text(
      this.cameras.main.width-10, 10, '턴 1 · 아군',
      {fontSize:'10px', fill:'#888'}
    ).setOrigin(1,0).setScrollFactor(0).setDepth(100);

    this.weatherText = this.add.text(
      this.cameras.main.width-10, 24, this.weather.icon + ' ' + this.weather.name + ' — ' + this.weather.desc,
      {fontSize:'9px', fill:'#6a8aaa'}
    ).setOrigin(1,0).setScrollFactor(0).setDepth(100);

    this.eraText = this.add.text(
      10, 10, ep.title, {fontSize:'10px', fill:'#c4956a', fontStyle:'bold'}
    ).setOrigin(0,0).setScrollFactor(0).setDepth(100);

    // 음소거 버튼
    this.muteBtn = this.add.text(10, 24, audioMgr.muted ? '🔇' : '🔊', {fontSize:'16px'})
      .setScrollFactor(0).setDepth(100).setInteractive();
    this.muteBtn.on('pointerdown', () => {
      const m = audioMgr.toggle();
      this.muteBtn.setText(m ? '🔇' : '🔊');
      if (!m) audioMgr.playBGM('battle');
    });

    // 미니맵
    this.createMinimap();

    // 날씨 파티클
    this.weatherParticles = [];
    if (this.weather.id === 'rain' || this.weather.id === 'snow') {
      for (let i = 0; i < 40; i++) {
        const w2 = this.cameras.main.width, h2 = this.cameras.main.height;
        const p = this.add.circle(
          Phaser.Math.Between(0, w2), Phaser.Math.Between(0, h2),
          this.weather.id === 'rain' ? 1 : 2,
          this.weather.id === 'rain' ? 0x5588cc : 0xffffff,
          0.3
        ).setScrollFactor(0).setDepth(90);
        this.weatherParticles.push({ obj: p,
          vy: this.weather.id === 'rain' ? Phaser.Math.FloatBetween(3, 6) : Phaser.Math.FloatBetween(0.5, 1.5),
          vx: this.weather.id === 'rain' ? 1 : Phaser.Math.FloatBetween(-0.5, 0.5)
        });
      }
    }

    // 안개 오버레이
    if (this.weather.id === 'fog') {
      this.fogOverlay = this.add.rectangle(
        this.cameras.main.width/2, this.cameras.main.height/2,
        this.cameras.main.width, this.cameras.main.height,
        0x888888, 0.15
      ).setScrollFactor(0).setDepth(89);
    }

    // 턴 배너
    this.showTurnBanner('아군 턴');
    this.cameras.main.fadeIn(800);
  }

  update() {
    // 날씨 파티클 업데이트
    const w = this.cameras.main.width, h = this.cameras.main.height;
    this.weatherParticles.forEach(p => {
      p.obj.y += p.vy;
      p.obj.x += p.vx;
      if (p.obj.y > h) { p.obj.y = -5; p.obj.x = Phaser.Math.Between(0, w); }
      if (p.obj.x > w) p.obj.x = 0;
      if (p.obj.x < 0) p.obj.x = w;
    });
  }

  // ── 턴 배너 ──────────────────────────────
  showTurnBanner(text) {
    const w = this.cameras.main.width, h = this.cameras.main.height;
    const banner = this.add.text(w/2, h/2, text, {
      fontSize:'22px', fill:'#FFD700', fontStyle:'bold', fontFamily:'Noto Serif KR, serif',
      shadow:{offsetX:0,offsetY:0,blur:10,color:'#FFD70066',fill:true}
    }).setOrigin(0.5).setScrollFactor(0).setDepth(300).setAlpha(0);
    this.tweens.add({
      targets: banner, alpha:1, duration:400, yoyo:true, hold:600,
      onComplete: () => banner.destroy()
    });
  }

  // ── 미니맵 ───────────────────────────────
  createMinimap() {
    const mw = 80, mh = 80;
    const w = this.cameras.main.width;
    const mx = w - mw - 8, my = 40;
    this.minimapContainer = this.add.container(mx, my).setScrollFactor(0).setDepth(95);

    const bg = this.add.rectangle(mw/2, mh/2, mw, mh, 0x000000, 0.6).setStrokeStyle(1, 0xc4956a, 0.5);
    this.minimapContainer.add(bg);

    // 지형
    const scale = mw / MAP_W;
    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        const t = this.mapData[y][x];
        const info = TILE_INFO[t];
        const c = Phaser.Display.Color.HexStringToColor(info.colors[0]).color;
        const dot = this.add.rectangle(x*scale+scale/2, y*scale+scale/2, scale, scale, c, 0.7);
        this.minimapContainer.add(dot);
      }
    }

    // 유닛 점 (업데이트용)
    this.minimapDots = [];
    this.updateMinimap();

    // 미니맵 클릭으로 카메라 이동
    bg.setInteractive();
    bg.on('pointerdown', (ptr) => {
      const lx = ptr.x - mx, ly = ptr.y - my;
      const gx = Math.floor(lx / scale), gy = Math.floor(ly / scale);
      this.cameras.main.pan(gx*CELL+CELL/2, gy*CELL+CELL/2, 300);
    });
  }

  updateMinimap() {
    this.minimapDots.forEach(d => d.destroy());
    this.minimapDots = [];
    const scale = 80 / MAP_W;
    this.units.filter(u => u.alive).forEach(u => {
      const color = u.team === 'ally' ? 0x2ecc71 : 0xe74c3c;
      const dot = this.add.circle(u.x*scale+scale/2, u.y*scale+scale/2, 2, color);
      this.minimapContainer.add(dot);
      this.minimapDots.push(dot);
    });
  }

  // ── 타일맵 ───────────────────────────────
  drawTilemap() {
    this.tileContainer = this.add.container(0, 0).setDepth(0);
    for (let y = 0; y < MAP_H; y++) {
      for (let x = 0; x < MAP_W; x++) {
        const t = this.mapData[y][x];
        const info = TILE_INFO[t];
        const px = x*CELL, py = y*CELL;
        const color = (x+y)%2===0 ? info.colors[0] : info.colors[1];
        const rect = this.add.rectangle(px+CELL/2, py+CELL/2, CELL, CELL,
          Phaser.Display.Color.HexStringToColor(color).color);
        this.tileContainer.add(rect);

        if (t === TILE.FOREST) {
          const tree = this.add.triangle(px+CELL/2,py+CELL*.35,0,CELL*.3,CELL*.2,0,CELL*.4,CELL*.3,0x1a4a0a).setOrigin(0.5);
          const trunk = this.add.rectangle(px+CELL/2,py+CELL*.65,3,CELL*.2,0x5a3a1a);
          this.tileContainer.add([tree, trunk]);
        } else if (t === TILE.MOUNT) {
          const mt = this.add.triangle(px+CELL/2,py+CELL*.3,0,CELL*.35,CELL*.22,0,CELL*.44,CELL*.35,0x6a6a5a).setOrigin(0.5);
          const snow = this.add.triangle(px+CELL/2,py+CELL*.18,0,CELL*.1,CELL*.06,0,CELL*.12,CELL*.1,0xeeeeee).setOrigin(0.5);
          this.tileContainer.add([mt, snow]);
        } else if (t === TILE.PEAK) {
          const mt = this.add.triangle(px+CELL/2,py+CELL*.25,0,CELL*.45,CELL*.25,0,CELL*.5,CELL*.45,0x5a5a4a).setOrigin(0.5);
          const snow = this.add.triangle(px+CELL/2,py+CELL*.1,0,CELL*.15,CELL*.1,0,CELL*.2,CELL*.15,0xffffff).setOrigin(0.5);
          this.tileContainer.add([mt, snow]);
        } else if (t === TILE.WATER) {
          for (let w = 0; w < 2; w++) {
            const wave = this.add.rectangle(px+CELL/2,py+CELL*(.35+w*.3),CELL*.7,1.5,0x4a8acc,0.3);
            this.tileContainer.add(wave);
          }
        } else if (t === TILE.SACRED) {
          const glow = this.add.circle(px+CELL/2,py+CELL/2,CELL*.5,0xFFD700,0.15);
          const trk = this.add.rectangle(px+CELL/2,py+CELL*.55,CELL*.12,CELL*.4,0x5a3a1a);
          const crown = this.add.circle(px+CELL/2,py+CELL*.28,CELL*.25,0x2a7a1a);
          const glow2 = this.add.circle(px+CELL/2,py+CELL*.28,CELL*.3,0xFFD700,0.2);
          this.tileContainer.add([glow, trk, crown, glow2]);
        } else if (t === TILE.PATH) {
          const path = this.add.rectangle(px+CELL/2,py+CELL/2,CELL*.5,CELL,0x9a8a6a,0.2);
          this.tileContainer.add(path);
        } else if (t === TILE.CLOUD) {
          const c1 = this.add.circle(px+CELL*.3,py+CELL*.5,CELL*.2,0xffffff,0.15);
          const c2 = this.add.circle(px+CELL*.7,py+CELL*.4,CELL*.15,0xffffff,0.1);
          this.tileContainer.add([c1, c2]);
        }
      }
    }
    // 격자
    const gridG = this.add.graphics().setDepth(1);
    gridG.lineStyle(1, 0x000000, 0.15);
    for (let x = 0; x <= MAP_W; x++) { gridG.moveTo(x*CELL,0); gridG.lineTo(x*CELL,MAP_H*CELL); }
    for (let y = 0; y <= MAP_H; y++) { gridG.moveTo(0,y*CELL); gridG.lineTo(MAP_W*CELL,y*CELL); }
    gridG.strokePath();
  }

  // ── 유닛 생성 ────────────────────────────
  createUnits(ep) {
    ep.allies.forEach(data => {
      const saved = gameState.unitLevels && gameState.unitLevels[data.id];
      const unitData = {...data};
      if (saved) {
        unitData.level = saved.level || 1;
        unitData.xp = saved.xp || 0;
        const lvlBonus = (saved.level - 1);
        unitData.hp += lvlBonus * 3; unitData.maxHp += lvlBonus * 3;
        unitData.atk += lvlBonus * 2; unitData.def += lvlBonus;
      }
      this.units.push(this.createUnitSprite(unitData, 'ally'));
    });
    ep.enemies.forEach(data => {
      this.units.push(this.createUnitSprite({...data, level:1, xp:0}, 'enemy'));
    });
  }

  createUnitSprite(data, team) {
    const unit = { ...data, team, hp:data.hp, x:data.startX, y:data.startY, acted:false, alive:true };
    const px = unit.x*CELL, py = unit.y*CELL;
    const container = this.add.container(px, py).setDepth(10);
    unit.container = container;
    this.drawArmyInContainer(container, unit);
    return unit;
  }

  drawArmyInContainer(container, unit) {
    container.removeAll(true);
    const c = unit.colors;
    const w = CELL, h = CELL;

    // 팀바
    container.add(this.add.rectangle(w/2, 2.5, w-4, 4,
      unit.team==='ally' ? 0x27ae60 : 0xe74c3c, 0.6));

    // 레벨 표시
    if (unit.level && unit.level > 1) {
      container.add(this.add.text(3, 0, 'Lv'+unit.level, {
        fontSize:'7px', fill:'#FFD700', fontStyle:'bold'
      }));
    }

    // 깃발
    container.add(this.add.rectangle(w*0.72, h*0.2, 1.5, h*0.4,
      Phaser.Display.Color.HexStringToColor('#5a3a1a').color));
    container.add(this.add.triangle(w*0.72+w*0.1, h*0.1,
      0,0, w*0.2,h*0.06, 0,h*0.12,
      Phaser.Display.Color.HexStringToColor(c.flag).color));

    // 병사 5명
    const positions = [{r:-1,c:-1},{r:-1,c:1},{r:0,c:-1.5},{r:0,c:0},{r:0,c:1.5}];
    const sz = Math.max(3, w*0.09);
    const cx0 = w*0.4, cy0 = h*0.38, sp = sz*2;

    positions.forEach((p, i) => {
      const sx = cx0 + p.c*sp, sy = cy0 + p.r*sp*0.8;
      container.add(this.add.rectangle(sx, sy+sz*0.6, sz, sz*1.3,
        Phaser.Display.Color.HexStringToColor(c.armor).color));
      container.add(this.add.rectangle(sx, sy-sz*0.1, sz*1.1, sz*0.5,
        Phaser.Display.Color.HexStringToColor(i===0?c.cape:c.flag).color));
      container.add(this.add.circle(sx, sy-sz*0.15, sz*0.35,
        Phaser.Display.Color.HexStringToColor(c.skin).color));
      container.add(this.add.arc(sx, sy-sz*0.25, sz*0.3, 180, 0, false,
        Phaser.Display.Color.HexStringToColor(c.armor).color));
      container.add(this.add.rectangle(sx+sz*0.35, sy, 1, sz*1.8, 0xaaaaaa));
    });

    // HP바
    const hpPct = Math.max(0, unit.hp / unit.maxHp);
    container.add(this.add.rectangle(w/2, h-6, w-8, 4, 0x111111));
    const barFg = this.add.rectangle(4, h-6, (w-8)*hpPct, 4,
      unit.team==='ally' ? 0x2ecc71 : 0xe74c3c).setOrigin(0, 0.5);
    container.add(barFg);
    unit.hpBar = barFg;

    // 이름
    container.add(this.add.text(w/2, h+1, unit.name, {
      fontSize: Math.max(9,CELL*0.2)+'px', fill: unit.team==='ally' ? '#e8dcc8' : '#ffaaaa',
      fontStyle:'bold', fontFamily:'Noto Serif KR, serif',
      shadow:{offsetX:1,offsetY:1,blur:2,color:'#000',fill:true}
    }).setOrigin(0.5, 0));

    // 행동완료 오버레이
    unit.actedOverlay = this.add.rectangle(w/2, h/2, w, h, 0x000000, 0).setDepth(1);
    container.add(unit.actedOverlay);
  }

  updateUnitPosition(unit) { unit.container.setPosition(unit.x*CELL, unit.y*CELL); }
  updateUnitHP(unit) {
    const pct = Math.max(0, unit.hp / unit.maxHp);
    if (unit.hpBar) unit.hpBar.setDisplaySize((CELL-8)*pct, 4);
  }
  setUnitActed(unit, acted) {
    unit.acted = acted;
    if (unit.actedOverlay) unit.actedOverlay.setFillStyle(0x000000, acted ? 0.45 : 0);
  }

  // ── 탭 처리 ──────────────────────────────
  handleTap(pointer) {
    const worldX = pointer.x + this.cameras.main.scrollX;
    const worldY = pointer.y + this.cameras.main.scrollY;
    const gx = Math.floor(worldX / CELL), gy = Math.floor(worldY / CELL);
    if (gx < 0 || gx >= MAP_W || gy < 0 || gy >= MAP_H) return;

    // 지형 정보 표시 (항상)
    const tile = this.mapData[gy][gx];
    const tInfo = TILE_INFO[tile];
    let terrainMsg = tInfo.name;
    if (tInfo.defBonus) terrainMsg += ' (방어+' + tInfo.defBonus + ')';
    if (tInfo.healBonus) terrainMsg += ' (턴당 HP+' + tInfo.healBonus + ')';
    if (tInfo.movBonus) terrainMsg += ' (이동+' + tInfo.movBonus + ')';

    switch(this.phase) {
      case 'playerSelect': {
        const ally = this.getAliveUnit(gx, gy, 'ally');
        if (ally && !ally.acted) { audioMgr.playSFX('click'); this.selectUnit(ally); }
        else this.setGuide(terrainMsg);
        break;
      }
      case 'playerMove':
        if (this.moveRange.some(m => m.x===gx && m.y===gy)) {
          audioMgr.playSFX('click');
          this.moveSelectedUnit(gx, gy);
        } else {
          const otherAlly = this.getAliveUnit(gx, gy, 'ally');
          if (otherAlly && !otherAlly.acted) this.selectUnit(otherAlly);
          else this.deselectUnit();
        }
        break;
      case 'playerAttackTarget': {
        const target = this.attackTargets.find(u => u.x===gx && u.y===gy);
        if (target) this.executeAttack(target);
        break;
      }
    }
  }

  // ── 유닛 선택 ────────────────────────────
  selectUnit(unit) {
    this.selectedUnit = unit;
    this.phase = 'playerMove';
    this.moveRange = this.calcMoveRange(unit);
    this.attackTargets = [];
    this.drawMoveRange();
    this.clearAtkRange();
    this.selectionBox.setPosition(unit.x*CELL+CELL/2, unit.y*CELL+CELL/2).setVisible(true);
    this.showHUD(unit);
    this.hideActionButtons();
    const lvlStr = unit.level ? ' Lv.' + unit.level : '';
    this.setGuide(unit.name + lvlStr + ' (' + unit.title + ') — 이동할 칸을 터치');
    this.cameras.main.pan(unit.x*CELL+CELL/2, unit.y*CELL+CELL/2, 300);
  }

  deselectUnit() {
    this.selectedUnit = null;
    this.phase = 'playerSelect';
    this.moveRange = [];
    this.clearMoveRange(); this.clearAtkRange();
    this.selectionBox.setVisible(false);
    this.hideHUD();
    this.setGuide('아군을 터치하여 선택');
  }

  // ── 이동범위 (BFS) + 날씨/지형 보너스 ─────
  calcMoveRange(unit) {
    const range = [];
    const visited = new Set();
    const baseMov = unit.mov + (this.weather.movMod || 0);
    const mov = Math.max(1, baseMov);
    const queue = [{x:unit.x, y:unit.y, steps:0}];
    visited.add(unit.x+','+unit.y);

    while (queue.length > 0) {
      const cur = queue.shift();
      if (cur.steps > 0) {
        const occupant = this.getAliveUnit(cur.x, cur.y);
        const passable = TILE_INFO[this.mapData[cur.y][cur.x]].passable;
        if (!occupant && passable) range.push({x:cur.x, y:cur.y});
        if (occupant || !passable) continue;
      }
      if (cur.steps < mov) {
        [{dx:-1,dy:0},{dx:1,dy:0},{dx:0,dy:-1},{dx:0,dy:1}].forEach(d => {
          const nx = cur.x+d.dx, ny = cur.y+d.dy, key = nx+','+ny;
          if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H && !visited.has(key)) {
            if (TILE_INFO[this.mapData[ny][nx]].passable) {
              const blocker = this.getAliveUnit(nx, ny);
              if (!blocker || blocker.team === unit.team) {
                visited.add(key);
                const movBonus = TILE_INFO[this.mapData[ny][nx]].movBonus || 0;
                queue.push({x:nx, y:ny, steps: cur.steps + 1 - Math.min(movBonus, 0.5)});
              }
            }
          }
        });
      }
    }
    return range;
  }

  // ── 이동 ─────────────────────────────────
  moveSelectedUnit(tx, ty) {
    const unit = this.selectedUnit;
    unit.x = tx; unit.y = ty;
    this.updateUnitPosition(unit);
    this.clearMoveRange();
    this.phase = 'playerAction';
    this.updateMinimap();

    const maxRng = Math.max(unit.rng||1,
      ...unit.skills.filter(s => s.type==='attack').map(s => s.rng||1));
    const nearEnemies = this.units.filter(e =>
      e.team==='enemy' && e.alive && this.manhattanDist(unit, e) <= maxRng);

    this.selectionBox.setPosition(tx*CELL+CELL/2, ty*CELL+CELL/2);
    this.showHUD(unit);
    this.showActionButtons(unit, nearEnemies);
    this.setGuide(nearEnemies.length > 0 ? '행동을 선택하세요' : '대기/회복 선택');
  }

  // ── 공격 시작 ─────────────────────────────
  startAttack(mode, skillIdx) {
    this.attackMode = mode;
    this.attackSkillIdx = skillIdx;
    const unit = this.selectedUnit;
    const rng = mode==='skill' ? unit.skills[skillIdx].rng||1 : unit.rng||1;
    this.attackTargets = this.units.filter(e =>
      e.team==='enemy' && e.alive && this.manhattanDist(unit, e) <= rng);
    if (this.attackTargets.length === 0) { this.setGuide('범위 내 적 없음'); return; }
    if (this.attackTargets.length === 1) { this.executeAttack(this.attackTargets[0]); return; }
    this.phase = 'playerAttackTarget';
    this.drawAtkRange();
    this.setGuide('공격할 적을 터치!');
  }

  // ── 공격 실행 + 크리티컬 + 지형보너스 + XP ──
  executeAttack(target) {
    this.phase = 'cutscene';
    this.clearAtkRange();
    this.hideActionButtons();
    const unit = this.selectedUnit;
    let baseDmg, skillName, element;

    // 날씨 공격력 보정
    const atkMod = this.weather.atkMod || 0;

    if (this.attackMode==='skill' && this.attackSkillIdx != null) {
      const sk = unit.skills[this.attackSkillIdx];
      baseDmg = sk.dmg;
      skillName = sk.name;
      element = sk.element;
      audioMgr.playSFX('skill');
    } else {
      baseDmg = unit.atk + atkMod;
      skillName = '공격';
      element = null;
      audioMgr.playSFX('hit');
    }

    // 지형 방어 보너스
    const targetTile = this.mapData[target.y][target.x];
    const terrainDef = TILE_INFO[targetTile].defBonus || 0;

    // 크리티컬 (10%)
    const isCrit = Phaser.Math.Between(1, 10) === 1;
    let dmg = Math.max(1, baseDmg - target.def - terrainDef) + Phaser.Math.Between(0, 5);
    if (isCrit) { dmg = Math.floor(dmg * 1.5); audioMgr.playSFX('crit'); }

    this.showCutin(unit, target, dmg, skillName, isCrit, element, () => {
      // XP 획득 (아군만)
      if (unit.team === 'ally') {
        const xpGain = target.alive ? 10 : 50;
        this.grantXP(unit, xpGain);
      }
      // 반격
      if (target.alive && this.manhattanDist(unit, target) <= (target.rng||1)) {
        const counterDmg = Math.max(1, target.atk - unit.def - 2) + Phaser.Math.Between(0, 3);
        this.time.delayedCall(200, () => {
          this.showCutin(target, unit, counterDmg, '반격', false, null, () => {
            this.finishAction();
          });
        });
      } else {
        this.finishAction();
      }
    });
  }

  // ── XP 획득 + 레벨업 ─────────────────────
  grantXP(unit, amount) {
    if (!unit.xp && unit.xp !== 0) unit.xp = 0;
    if (!unit.level) unit.level = 1;
    unit.xp += amount;
    if (unit.xp >= 100) {
      unit.xp -= 100;
      unit.level++;
      unit.maxHp += 3; unit.hp = Math.min(unit.hp + 3, unit.maxHp);
      unit.atk += 2; unit.def += 1;
      // 레벨업 이펙트
      audioMgr.playSFX('levelup');
      this.showLevelUpEffect(unit);
      // 세이브 갱신
      if (!gameState.unitLevels) gameState.unitLevels = {};
      gameState.unitLevels[unit.id] = { level: unit.level, xp: unit.xp };
      gameState.maxLevel = Math.max(gameState.maxLevel || 1, unit.level);
    }
  }

  showLevelUpEffect(unit) {
    const px = unit.x*CELL+CELL/2, py = unit.y*CELL+CELL/2;
    // 골든 링
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const particle = this.add.circle(px, py, 3, 0xFFD700, 0.8).setDepth(20);
      this.tweens.add({
        targets: particle,
        x: px + Math.cos(angle)*30, y: py + Math.sin(angle)*30,
        alpha: 0, duration: 800, ease: 'Power2',
        onComplete: () => particle.destroy()
      });
    }
    // 텍스트
    const lvlText = this.add.text(px, py-20, 'LEVEL UP!', {
      fontSize:'12px', fill:'#FFD700', fontStyle:'bold',
      shadow:{offsetX:0,offsetY:0,blur:8,color:'#FFD700',fill:true}
    }).setOrigin(0.5).setDepth(20);
    this.tweens.add({
      targets: lvlText, y: py-50, alpha:0, duration:1200,
      onComplete: () => lvlText.destroy()
    });
    // 유닛 스프라이트 갱신
    this.drawArmyInContainer(unit.container, unit);
  }

  // ── 회복/아이템/대기 ──────────────────────
  useHealSkill(skillIdx) {
    const unit = this.selectedUnit;
    const sk = unit.skills[skillIdx];
    unit.hp = Math.min(unit.maxHp, unit.hp + sk.amount);
    this.updateUnitHP(unit);
    audioMgr.playSFX('heal');
    // 힐 파티클
    this.spawnParticles(unit.x*CELL+CELL/2, unit.y*CELL+CELL/2, 0x2ecc71, 12);
    if (unit.team === 'ally') this.grantXP(unit, 15);
    this.showPopup('회복', sk.name + '!\nHP ' + sk.amount + ' 회복!', () => this.finishAction());
  }

  useItem() {
    if (this.itemCount <= 0) return;
    this.itemCount--;
    const unit = this.selectedUnit;
    unit.hp = Math.min(unit.maxHp, unit.hp + 20);
    this.updateUnitHP(unit);
    audioMgr.playSFX('heal');
    this.spawnParticles(unit.x*CELL+CELL/2, unit.y*CELL+CELL/2, 0x2ecc71, 8);
    this.showPopup('아이템', '회복약!\nHP 20 회복! (남은 ' + this.itemCount + ')', () => this.finishAction());
  }

  doWait() { this.finishAction(); }

  // ── 파티클 이펙트 ─────────────────────────
  spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const p = this.add.circle(x, y, Phaser.Math.Between(2, 4), color, 0.8).setDepth(20);
      this.tweens.add({
        targets: p,
        x: x + Phaser.Math.Between(-30, 30),
        y: y + Phaser.Math.Between(-40, -10),
        alpha: 0, scale: 0.3, duration: Phaser.Math.Between(400, 800),
        onComplete: () => p.destroy()
      });
    }
  }

  // ── 행동 완료 ─────────────────────────────
  finishAction() {
    if (this.selectedUnit) this.setUnitActed(this.selectedUnit, true);
    this.selectedUnit = null;
    this.moveRange = [];
    this.attackTargets = [];
    this.clearMoveRange(); this.clearAtkRange();
    this.selectionBox.setVisible(false);
    this.hideHUD(); this.hideActionButtons();
    this.updateMinimap();

    // 승리
    if (!this.units.some(e => e.team==='enemy' && e.alive)) {
      audioMgr.stopBGM();
      audioMgr.playSFX('victory');
      this.time.delayedCall(500, () => {
        this.cameras.main.fadeOut(500);
        this.time.delayedCall(500, () => this.scene.start('Victory'));
      });
      return;
    }
    // 패배
    if (!this.units.some(a => a.team==='ally' && a.alive)) {
      audioMgr.stopBGM();
      this.time.delayedCall(500, () => this.showPopup('패배', '다시 도전하라!', () => this.scene.restart()));
      return;
    }
    // 턴 진행
    if (this.units.some(a => a.team==='ally' && a.alive && !a.acted)) {
      this.phase = 'playerSelect';
      this.setGuide('다음 아군을 선택');
    } else {
      this.startEnemyTurn();
    }
  }

  // ── 적 턴 AI (스킬 사용 + 약한 유닛 우선) ──
  startEnemyTurn() {
    this.phase = 'enemyTurn';
    this.setGuide('적 턴...');
    this.turnText.setText('턴 ' + this.turnCount + ' · 적군');
    this.showTurnBanner('적군 턴');

    // 신단수 턴 회복
    this.units.filter(u => u.alive).forEach(u => {
      const tile = this.mapData[u.y][u.x];
      const healBonus = TILE_INFO[tile].healBonus || 0;
      if (healBonus > 0) {
        u.hp = Math.min(u.maxHp, u.hp + healBonus);
        this.updateUnitHP(u);
      }
    });

    const enemies = this.units.filter(u => u.team==='enemy' && u.alive);
    let idx = 0;

    const nextEnemy = () => {
      if (idx >= enemies.length) {
        this.turnCount++;
        this.startPlayerTurn();
        return;
      }
      const e = enemies[idx]; idx++;
      if (!e.alive) { nextEnemy(); return; }

      const allies = this.units.filter(u => u.team==='ally' && u.alive);
      if (allies.length === 0) {
        this.showPopup('패배', '다시 도전하라!', () => this.scene.restart());
        return;
      }

      // 약한 유닛 우선 타겟
      let target = allies[0], minScore = 999;
      allies.forEach(a => {
        const dist = this.manhattanDist(e, a);
        const hpRatio = a.hp / a.maxHp;
        const score = dist + hpRatio * 3;
        if (score < minScore) { minScore = score; target = a; }
      });

      this.cameras.main.pan(e.x*CELL+CELL/2, e.y*CELL+CELL/2, 200);

      // AI: 체력 낮으면 힐 스킬 사용
      const healSkill = e.skills.find(s => s.type === 'heal');
      if (healSkill && e.hp < e.maxHp * 0.4) {
        e.hp = Math.min(e.maxHp, e.hp + healSkill.amount);
        this.updateUnitHP(e);
        audioMgr.playSFX('heal');
        this.spawnParticles(e.x*CELL+CELL/2, e.y*CELL+CELL/2, 0xe74c3c, 8);
        this.time.delayedCall(400, nextEnemy);
        return;
      }

      const dist = this.manhattanDist(e, target);
      if (dist <= (e.rng || 1)) {
        // 공격 스킬 사용 시도
        const atkSkill = e.skills.find(s => s.type === 'attack' && (s.rng||1) >= dist);
        if (atkSkill && Phaser.Math.Between(1, 3) <= 2) {
          this.time.delayedCall(300, () => this.enemySkillAttack(e, target, atkSkill, nextEnemy));
        } else {
          this.time.delayedCall(300, () => this.enemyAttack(e, target, nextEnemy));
        }
      } else {
        const moveR = this.calcMoveRange(e);
        let bestCell = null, bestDist = 999;
        moveR.forEach(c => {
          const d = Math.abs(c.x-target.x) + Math.abs(c.y-target.y);
          if (d < bestDist) { bestDist = d; bestCell = c; }
        });
        if (bestCell) { e.x = bestCell.x; e.y = bestCell.y; this.updateUnitPosition(e); }
        this.updateMinimap();
        if (this.manhattanDist(e, target) <= (e.rng||1)) {
          this.time.delayedCall(350, () => this.enemyAttack(e, target, nextEnemy));
        } else {
          this.time.delayedCall(250, nextEnemy);
        }
      }
    };
    this.time.delayedCall(500, nextEnemy);
  }

  enemyAttack(attacker, defender, callback) {
    this.phase = 'cutscene';
    const dmg = Math.max(1, attacker.atk - defender.def) + Phaser.Math.Between(0, 4);
    const isCrit = Phaser.Math.Between(1, 10) === 1;
    const finalDmg = isCrit ? Math.floor(dmg * 1.5) : dmg;
    audioMgr.playSFX(isCrit ? 'crit' : 'hit');
    this.showCutin(attacker, defender, finalDmg, attacker.name + '의 공격', isCrit, null, () => {
      if (!this.units.some(a => a.team==='ally' && a.alive)) {
        this.showPopup('패배', '다시 도전하라!', () => this.scene.restart());
        return;
      }
      this.phase = 'enemyTurn';
      this.time.delayedCall(200, callback);
    });
  }

  enemySkillAttack(attacker, defender, skill, callback) {
    this.phase = 'cutscene';
    const dmg = Math.max(1, skill.dmg - defender.def) + Phaser.Math.Between(0, 5);
    audioMgr.playSFX('skill');
    this.showCutin(attacker, defender, dmg, skill.name, false, skill.element, () => {
      if (!this.units.some(a => a.team==='ally' && a.alive)) {
        this.showPopup('패배', '다시 도전하라!', () => this.scene.restart());
        return;
      }
      this.phase = 'enemyTurn';
      this.time.delayedCall(200, callback);
    });
  }

  startPlayerTurn() {
    this.units.filter(u => u.team==='ally' && u.alive).forEach(u => this.setUnitActed(u, false));
    this.turnText.setText('턴 ' + this.turnCount + ' · 아군');
    this.phase = 'playerSelect';
    this.setGuide('아군을 터치하여 선택');
    this.showTurnBanner('아군 턴 ' + this.turnCount);
  }

  // ── 전투 컷인 + 파티클 ────────────────────
  showCutin(attacker, defender, dmg, label, isCrit, element, callback) {
    const w = this.cameras.main.width, h = this.cameras.main.height;
    const bg = this.add.rectangle(w/2,h/2,w,h,0x000000,0.85).setScrollFactor(0).setDepth(200);

    // 공격자
    const lName = this.add.text(w*0.25, h*0.35, attacker.name, {
      fontSize:'16px', fontStyle:'bold',
      fill: attacker.team==='ally' ? '#e8dcc8' : '#ff6666',
      fontFamily:'Noto Serif KR, serif'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(201);
    const lHp = this.add.text(w*0.25, h*0.42, 'HP '+attacker.hp+'/'+attacker.maxHp, {
      fontSize:'10px', fill:'#aaa'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

    // VS
    const vsText = this.add.text(w*0.5, h*0.38, '⚔️', {fontSize:'28px'})
      .setOrigin(0.5).setScrollFactor(0).setDepth(201);

    // 방어자
    const rName = this.add.text(w*0.75, h*0.35, defender.name, {
      fontSize:'16px', fontStyle:'bold',
      fill: defender.team==='ally' ? '#e8dcc8' : '#ff6666',
      fontFamily:'Noto Serif KR, serif'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(201);
    const rHp = this.add.text(w*0.75, h*0.42, 'HP '+defender.hp+'/'+defender.maxHp, {
      fontSize:'10px', fill:'#aaa'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

    // 스킬명
    const msgText = this.add.text(w*0.5, h*0.52, label + '!', {
      fontSize:'13px', fill:'#ddd'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(201);

    // 크리티컬 표시
    let critText = null;
    if (isCrit) {
      critText = this.add.text(w*0.5, h*0.48, '💥 CRITICAL!', {
        fontSize:'14px', fill:'#FF4444', fontStyle:'bold'
      }).setOrigin(0.5).setScrollFactor(0).setDepth(201);
    }

    const dmgText = this.add.text(w*0.5, h*0.6, '', {
      fontSize:'24px', fontStyle:'bold', fill: isCrit ? '#FF0000' : '#ff4444',
      fontFamily:'Noto Serif KR, serif'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(201).setAlpha(0);

    const flash = this.add.rectangle(w/2,h/2,w,h,0xffffff,0).setScrollFactor(0).setDepth(202);

    // 스킬 파티클
    if (element) {
      const colors = { fire:0xFF4500, thunder:0xFFD700, wind:0x00FF88, water:0x1E90FF };
      const color = colors[element] || 0xFFFFFF;
      for (let i = 0; i < 15; i++) {
        const p = this.add.circle(w*0.5, h*0.45, Phaser.Math.Between(2,5), color, 0.7)
          .setScrollFactor(0).setDepth(203);
        this.tweens.add({
          targets: p,
          x: w*0.5 + Phaser.Math.Between(-60,60),
          y: h*0.45 + Phaser.Math.Between(-40,40),
          alpha:0, scale:0.2, duration: Phaser.Math.Between(300,600),
          delay: Phaser.Math.Between(100,400),
          onComplete: () => p.destroy()
        });
      }
    }

    // 히트 애니메이션
    this.time.delayedCall(350, () => {
      this.tweens.add({targets:lName, x:w*0.25+30, duration:150, yoyo:true});
      this.tweens.add({targets:rName, x:w*0.75-30, duration:150, yoyo:true});
      this.tweens.add({targets:flash, alpha: isCrit ? 0.6 : 0.4, duration:100, yoyo:true});
    });

    // 데미지 표시
    this.time.delayedCall(600, () => {
      defender.hp = Math.max(0, defender.hp - dmg);
      if (defender.hp <= 0) { defender.alive = false; audioMgr.playSFX('death'); }
      this.updateUnitHP(defender);
      if (!defender.alive) defender.container.setVisible(false);

      const dmgStr = (isCrit ? '💥 ' : '') + dmg + ' 데미지!';
      dmgText.setText(dmgStr);
      this.tweens.add({targets:dmgText, alpha:1, scale:{from:0.5,to:1}, duration:300, ease:'Back.easeOut'});
      rHp.setText('HP '+defender.hp+'/'+defender.maxHp);
      if (!defender.alive) msgText.setText(defender.name + ' 격파!');
    });

    // 종료
    this.time.delayedCall(1500, () => {
      const toDestroy = [bg, lName, lHp, vsText, rName, rHp, msgText, dmgText, flash];
      if (critText) toDestroy.push(critText);
      toDestroy.forEach(o => { if (o && o.destroy) o.destroy(); });
      callback();
    });
  }

  // ── 팝업 ──────────────────────────────────
  showPopup(title, body, callback) {
    const w = this.cameras.main.width, h = this.cameras.main.height;
    const bg = this.add.rectangle(w/2,h/2,w*0.8,160,0x151520,0.95)
      .setStrokeStyle(2,0xc4956a).setScrollFactor(0).setDepth(250);
    const tText = this.add.text(w/2,h/2-40,title,{
      fontSize:'15px',fontStyle:'bold',fill:'#c4956a'
    }).setOrigin(0.5).setScrollFactor(0).setDepth(251);
    const bText = this.add.text(w/2,h/2,body,{
      fontSize:'12px',fill:'#ccc',align:'center',lineSpacing:6
    }).setOrigin(0.5).setScrollFactor(0).setDepth(251);
    const btn = this.add.text(w/2,h/2+50,'확인',{
      fontSize:'13px',fill:'#e8dcc8',fontStyle:'bold',
      backgroundColor:'#2a2a3e',padding:{x:18,y:8}
    }).setOrigin(0.5).setScrollFactor(0).setDepth(251).setInteractive();
    btn.on('pointerdown', () => {
      [bg,tText,bText,btn].forEach(o => o.destroy());
      if (callback) callback();
    });
  }

  // ── 오버레이 ──────────────────────────────
  drawMoveRange() {
    this.clearMoveRange();
    this.moveRange.forEach(({x,y}) => {
      const rect = this.add.rectangle(x*CELL+CELL/2,y*CELL+CELL/2,CELL-2,CELL-2,0x50B4FF,0.28)
        .setStrokeStyle(2,0x50B4FF,0.6).setDepth(5);
      this.moveOverlays.add(rect);
    });
  }
  clearMoveRange() { this.moveOverlays.clear(true, true); }
  drawAtkRange() {
    this.clearAtkRange();
    this.attackTargets.forEach(u => {
      const rect = this.add.rectangle(u.x*CELL+CELL/2,u.y*CELL+CELL/2,CELL-2,CELL-2,0xFF3333,0.3)
        .setStrokeStyle(2,0xFF3333,0.65).setDepth(5);
      this.atkOverlays.add(rect);
    });
  }
  clearAtkRange() { this.atkOverlays.clear(true, true); }

  // ── HUD ───────────────────────────────────
  createHUD() {
    const w = this.cameras.main.width, h = this.cameras.main.height;
    this.hudContainer = this.add.container(0, h).setScrollFactor(0).setDepth(150);
    this.hudBg = this.add.rectangle(w/2, -50, w, 110, 0x0c0c18, 0.95);
    this.hudContainer.add(this.hudBg);

    this.hudName = this.add.text(60,-90,'',{fontSize:'13px',fontStyle:'bold',fill:'#e8dcc8'});
    this.hudTitle = this.add.text(60,-76,'',{fontSize:'10px',fill:'#999'});
    this.hudHpBg = this.add.rectangle(60,-60,150,8,0x1a1a2e).setOrigin(0,0.5);
    this.hudHpFill = this.add.rectangle(60,-60,150,8,0x2ecc71).setOrigin(0,0.5);
    this.hudHpText = this.add.text(215,-60,'',{fontSize:'9px',fill:'#aaa'}).setOrigin(0,0.5);
    this.hudSub = this.add.text(60,-48,'',{fontSize:'9px',fill:'#777'});
    this.hudContainer.add([this.hudName,this.hudTitle,this.hudHpBg,this.hudHpFill,this.hudHpText,this.hudSub]);
    this.hudBtnContainer = this.add.container(0,0).setScrollFactor(0).setDepth(151);
    this.hudBtnContainer.setVisible(false);
    this.hudContainer.setVisible(false);
  }

  showHUD(unit) {
    this.hudContainer.setVisible(true);
    const lvlStr = unit.level ? ' Lv.' + unit.level : '';
    this.hudName.setText(unit.name + lvlStr);
    this.hudTitle.setText(unit.title);
    const pct = unit.hp / unit.maxHp;
    this.hudHpFill.setDisplaySize(150*pct, 8);
    this.hudHpFill.setFillStyle(unit.team==='ally' ? 0x2ecc71 : 0xe74c3c);
    this.hudHpText.setText(unit.hp+'/'+unit.maxHp);
    const xpStr = unit.xp !== undefined ? ' · XP '+unit.xp+'/100' : '';
    this.hudSub.setText('ATK '+unit.atk+' · DEF '+unit.def+' · MOV '+unit.mov+' · RNG '+(unit.rng||1)+xpStr);
  }
  hideHUD() { this.hudContainer.setVisible(false); this.hideActionButtons(); }

  showActionButtons(unit, enemies) {
    this.hideActionButtons();
    const w = this.cameras.main.width, h = this.cameras.main.height;
    const btns = [];
    let bx = 8;
    const by = h - 28;
    const bw = Math.min(80, (w-16)/5 - 4);

    const makeBtn = (label, color, cb) => {
      const btn = this.add.text(bx, by, label, {
        fontSize:'11px', fontStyle:'bold', fill:'#e8dcc8',
        backgroundColor:color, padding:{x:6,y:8}, fixedWidth:bw, align:'center'
      }).setScrollFactor(0).setDepth(155).setInteractive();
      btn.on('pointerdown', () => { audioMgr.playSFX('click'); cb(); });
      btns.push(btn);
      bx += bw + 3;
    };

    const hasAdj = enemies.some(e => this.manhattanDist(unit,e) <= (unit.rng||1));
    if (hasAdj) makeBtn('⚔공격', '#7a1a0a', () => this.startAttack('basic'));

    unit.skills.forEach((sk, i) => {
      if (sk.type === 'heal') {
        makeBtn('💚'+sk.name.slice(0,3), '#1a3a5c', () => this.useHealSkill(i));
      } else {
        const has = enemies.some(e => this.manhattanDist(unit,e) <= (sk.rng||1));
        if (has) makeBtn('✨'+sk.name.slice(0,3), '#1a3a5c', () => this.startAttack('skill', i));
      }
    });

    if (this.itemCount > 0) makeBtn('🧪약'+this.itemCount, '#2a5a2a', () => this.useItem());
    makeBtn('⏳대기', '#2a2a3e', () => this.doWait());
    this.actionBtns = btns;
  }
  hideActionButtons() {
    if (this.actionBtns) { this.actionBtns.forEach(b => b.destroy()); this.actionBtns = []; }
  }

  // ── 유틸리티 ──────────────────────────────
  getAliveUnit(x, y, team) {
    return this.units.find(u => u.alive && u.x===x && u.y===y && (!team || u.team===team));
  }
  manhattanDist(a, b) { return Math.abs(a.x-b.x) + Math.abs(a.y-b.y); }
  setGuide(text) { if (this.guideText) this.guideText.setText(text); }
}

// ══════════════════════════════════════════════════
// 🏆 VictoryScene — 승리 + XP + 세이브
// ══════════════════════════════════════════════════
class VictoryScene extends Phaser.Scene {
  constructor() { super('Victory'); }

  create() {
    audioMgr.stopBGM();
    audioMgr.playSFX('victory');
    const ep = EPISODES[currentEpisode];
    const w = this.cameras.main.width, h = this.cameras.main.height;
    this.cameras.main.setBackgroundColor('#0a0a14');

    // 승리 파티클
    for (let i = 0; i < 20; i++) {
      const colors = [0xFFD700, 0xFF6B35, 0x00CED1, 0xFF5FA2];
      const p = this.add.circle(
        Phaser.Math.Between(0, w), h + 10,
        Phaser.Math.Between(2, 5),
        colors[Phaser.Math.Between(0, 3)], 0.7
      );
      this.tweens.add({
        targets: p,
        y: Phaser.Math.Between(-20, h*0.5),
        x: p.x + Phaser.Math.Between(-50, 50),
        alpha: 0, duration: Phaser.Math.Between(1500, 3000),
        delay: Phaser.Math.Between(0, 500)
      });
    }

    this.add.text(w/2, h*0.08, '🏆', {fontSize:'48px'}).setOrigin(0.5);
    this.add.text(w/2, h*0.17, '전투 승리!', {
      fontSize:'24px', fontStyle:'bold', fill:'#f4d03f', fontFamily:'Noto Serif KR, serif'
    }).setOrigin(0.5);

    // 보상
    this.add.rectangle(w/2, h*0.27, w*0.85, 40, 0x151520).setStrokeStyle(1,0xc4956a,0.3);
    this.add.text(w/2, h*0.27, '🎁 ' + ep.victory.reward, {
      fontSize:'12px', fontStyle:'bold', fill:'#f4d03f'
    }).setOrigin(0.5);

    // 유닛 레벨/XP 표시
    let yPos = h*0.35;
    this.add.text(w/2, yPos, '📊 부대 현황', {fontSize:'12px',fill:'#c4956a',fontStyle:'bold'}).setOrigin(0.5);
    yPos += 20;

    const allyData = ep.allies;
    allyData.forEach(a => {
      const saved = gameState.unitLevels && gameState.unitLevels[a.id];
      const lvl = saved ? saved.level : 1;
      const xp = saved ? saved.xp : 0;
      this.add.text(w*0.2, yPos, a.name + '  Lv.' + lvl + '  XP:' + xp + '/100', {
        fontSize:'10px', fill:'#ccc'
      });
      // XP바
      this.add.rectangle(w*0.75, yPos+5, 60, 6, 0x1a1a2e);
      this.add.rectangle(w*0.75-30+30*(xp/100), yPos+5, 60*(xp/100), 6, 0xFFD700).setOrigin(0, 0.5);
      yPos += 18;
    });

    // 역사 노트
    const noteY = yPos + 15;
    this.add.rectangle(w/2, noteY+40, w*0.88, 100, 0x0a0a14).setStrokeStyle(1,0xffffff,0.07);
    this.add.text(w/2, noteY+5, '📖 역사 포인트', {fontSize:'12px',fontStyle:'bold',fill:'#c4956a'}).setOrigin(0.5);
    this.add.text(w/2, noteY+45, ep.victory.historyNote, {
      fontSize:'10px', fill:'#aaa', wordWrap:{width:w*0.8}, lineSpacing:5, align:'center'
    }).setOrigin(0.5);

    // 세이브
    SaveManager.save(gameState);

    // 버튼들
    const btnY = Math.min(h*0.88, noteY + 110);

    if (currentEpisode === 1) {
      const nextBtn = this.add.text(w/2, btnY, '▶ EP.2 살수대첩으로', {
        fontSize:'14px', fill:'#e8dcc8', fontStyle:'bold',
        backgroundColor:'#104E8B', padding:{x:20,y:10}
      }).setOrigin(0.5).setInteractive();
      nextBtn.on('pointerdown', () => {
        currentEpisode = 2;
        gameState.currentEp = 2;
        SaveManager.save(gameState);
        this.scene.start('Story');
      });
    }

    const retryBtn = this.add.text(w*0.3, btnY+35, '🔄 다시', {
      fontSize:'12px', fill:'#e8dcc8', fontStyle:'bold',
      backgroundColor:'#6B1A0A', padding:{x:14,y:8}
    }).setOrigin(0.5).setInteractive();
    retryBtn.on('pointerdown', () => this.scene.start('Title'));

    const titleBtn = this.add.text(w*0.7, btnY+35, '🏠 타이틀', {
      fontSize:'12px', fill:'#e8dcc8', fontStyle:'bold',
      backgroundColor:'#2a2a3e', padding:{x:14,y:8}
    }).setOrigin(0.5).setInteractive();
    titleBtn.on('pointerdown', () => {
      audioMgr.stopBGM();
      this.scene.start('Title');
    });

    this.cameras.main.fadeIn(800);
  }
}

// ══════════════════════════════════════════════════
// 🏕️ CampScene — 파티 상태 확인 (미래 확장용)
// ══════════════════════════════════════════════════
class CampScene extends Phaser.Scene {
  constructor() { super('Camp'); }
  create() {
    const w = this.cameras.main.width, h = this.cameras.main.height;
    this.cameras.main.setBackgroundColor('#0a0a14');
    this.add.text(w/2, h*0.1, '⛺ 야영지', {
      fontSize:'20px', fill:'#c4956a', fontStyle:'bold', fontFamily:'Noto Serif KR, serif'
    }).setOrigin(0.5);

    this.add.text(w/2, h*0.2, '부대원 상태를 확인하세요', {fontSize:'11px',fill:'#888'}).setOrigin(0.5);

    let y = h*0.3;
    const ep = EPISODES[currentEpisode];
    ep.allies.forEach(a => {
      const saved = gameState.unitLevels && gameState.unitLevels[a.id];
      const lvl = saved ? saved.level : 1;
      this.add.text(w*0.15, y, a.name + ' (Lv.' + lvl + ') — ' + a.title, {
        fontSize:'11px', fill:'#e8dcc8'
      });
      y += 22;
    });

    const btn = this.add.text(w/2, h*0.8, '출발 ▶', {
      fontSize:'16px', fill:'#e8dcc8', fontStyle:'bold',
      backgroundColor:'#6B1A0A', padding:{x:24,y:12}
    }).setOrigin(0.5).setInteractive();
    btn.on('pointerdown', () => this.scene.start('Battle'));
  }
}

// ══════════════════════════════════════════════════
// 🎮 게임 실행
// ══════════════════════════════════════════════════
const config = {
  type: Phaser.AUTO,
  width: window.innerWidth,
  height: window.innerHeight,
  parent: 'game-container',
  backgroundColor: '#0a0a14',
  scale: {
    mode: Phaser.Scale.RESIZE,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  scene: [BootScene, TitleScene, StoryScene, BattleScene, VictoryScene, CampScene],
};

const game = new Phaser.Game(config);
</script></body></html>
